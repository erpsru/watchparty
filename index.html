<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBS Pro</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://js.pusher.com/8.0/pusher.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0b0e;
            --panel-bg: rgba(20, 20, 27, 0.75);
            --accent-color: #6366f1;
            --sync-color: #e11d48;
            --text-color: #f3f4f6;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(12, 12, 18, 0.45);
            --glass-blur: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; background: rgba(11, 11, 14, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); z-index: 10;
        }
        .logo { font-size: 1.25rem; font-weight: 800; tracking: -0.05em; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .room-controls { display: flex; gap: 0.75rem; align-items: center; }
        .btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 0.5rem 1rem; border-radius: 8px;
            font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        .btn-primary { background: var(--accent-color); border: none; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-danger { background: var(--sync-color); border: none; }
        .btn-danger:hover { background: #be123c; }

        #mainContainer { display: flex; flex: 1; position: relative; overflow: hidden; }
        #playerSection { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; }
        #videoWrapper { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; max-height: calc(100vh - 73px); object-fit: contain; }

        #sidebar {
            width: 380px; background: rgba(15, 15, 22, 0.6); backdrop-filter: blur(var(--glass-blur));
            border-left: 1px solid var(--border-color); display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5;
        }
        #sidebar.collapsed { transform: translateX(380px); position: absolute; right: 0; top: 0; bottom: 0; }

        .tabs { display: flex; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
        .tab { flex: 1; padding: 1rem; text-align: center; font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.4); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab.active { color: var(--accent-color); border-bottom-color: var(--accent-color); background: rgba(255,255,255,0.02); }

        .panel-content { flex: 1; overflow-y: auto; padding: 1.25rem; display: none; }
        .panel-content.active { display: flex; flex-direction: column; gap: 1.25rem; }

        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; tracking: 0.05em; color: rgba(255,255,255,0.4); }
        input[type="text"], select {
            background: rgba(0,0,0,0.25); border: 1px solid var(--border-color);
            color: #fff; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem;
            transition: all 0.2s; width: 100%;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent-color); background: rgba(0,0,0,0.4); }

        #chatMessageList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; padding: 0.5rem; margin-bottom: 1rem; scroll-behavior: smooth; }
        .chat-bubble { max-width: 85%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; position: relative; animation: fadeIn 0.2s ease; }
        .chat-bubble.system { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); font-size: 0.8rem; text-align: center; max-width: 100%; align-self: center; border-radius: 6px; }
        .chat-bubble.me { background: var(--accent-color); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-bubble.them { background: rgba(255,255,255,0.08); color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border-color); }
        .chat-meta { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 0.25rem; font-weight: 600; }
        .chat-input-wrapper { display: flex; gap: 0.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 10px; border: 1px solid var(--border-color); }
        .chat-input-wrapper input { border: none; background: transparent; flex: 1; padding: 0.5rem; color: #fff; font-size: 0.9rem; }
        .chat-input-wrapper input:focus { outline: none; }

        #peerList { display: flex; flex-direction: column; gap: 0.5rem; }
        .peer-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border-color); }
        .peer-info { display: flex; align-items: center; gap: 0.75rem; }
        .peer-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5, #06b6d4); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }
        .peer-status { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }

        /* Integrated Custom Native Subtitle Styles */
        .plyr__menu__container [data-plyr="custom-subtitle-settings"] {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .plyr-subtitle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #fff;
            padding: 4px 0;
        }
        .plyr-subtitle-label {
            font-weight: 500;
            opacity: 0.8;
        }
        .plyr-subtitle-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .plyr-subtitle-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            border-radius: 4px;
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .plyr-subtitle-btn:hover {
            background: var(--accent-color);
        }
        .plyr-subtitle-val {
            min-width: 45px;
            text-align: center;
            font-family: monospace;
            font-size: 12px;
        }
        .plyr-subtitle-upload-btn {
            background: rgba(255,255,255,0.1);
            border: 1px dashed rgba(255,255,255,0.3);
            color: #fff;
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            transition: all 0.2s;
        }
        .plyr-subtitle-upload-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--accent-color);
        }

        #syncProgressBadge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(11, 11, 14, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #glassInputLayer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur));
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .glass-box {
            background: rgba(20, 20, 27, 0.85); border: 1px solid var(--border-color);
            padding: 2.5rem; border-radius: 16px; width: 90%; max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; gap: 1.5rem;
        }

        .custom-player-toggle {
            background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border-color);
            color: #fff; border-radius: 4px; padding: 4px 10px; font-size: 13px;
            cursor: pointer; font-weight: 500; transition: all 0.2s;
        }
        .custom-player-toggle:hover, .custom-player-toggle.active {
            background: var(--accent-color); border-color: transparent;
        }

        .toast-container { position: fixed; bottom: 24px; left: 24px; display: flex; flex-direction: column; gap: 0.5rem; z-index: 2000; pointer-events: none; }
        .toast { background: rgba(20, 20, 27, 0.9); border: 1px solid var(--border-color); backdrop-filter: blur(10px); color: #fff; padding: 1rem 1.5rem; border-radius: 10px; font-size: 0.9rem; min-width: 280px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: space-between; pointer-events: auto; }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.info { border-left: 4px solid #3b82f6; }
        .toast.error { border-left: 4px solid #ef4444; }

        .plyr--fullscreen-active .plyr__video-wrapper { height: 100% !important; }
        .plyr__caption { font-size: 1.5rem !important; background: rgba(0, 0, 0, 0.75) !important; border-radius: 6px; padding: 4px 12px !important; bottom: 40px !important; line-height: 1.4; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">HBS Pro</div>
        <div class="room-controls">
            <button class="btn" id="toggleSidebarBtn">💬 Toggle Panel</button>
            <button class="btn btn-danger" id="forceSyncBtn">🔄 Force Sync Room</button>
        </div>
    </header>

    <div id="mainContainer">
        <div id="syncProgressBadge">
            <span class="spinner">⏳</span>
            <span id="syncProgressText">Preparing sync...</span>
        </div>

        <div id="playerSection">
            <div id="videoWrapper">
                <video id="player" playsinline controls></video>
            </div>
        </div>

        <div id="sidebar">
            <div class="tabs">
                <div class="tab active" data-target="#roomPanel">Room</div>
                <div class="tab" data-target="#chatPanel">Chat</div>
                <div class="tab" data-target="#peersPanel">Peers (<span id="peerCount">1</span>)</div>
            </div>

            <div id="roomPanel" class="panel-content active">
                <div class="input-group">
                    <label>Watch Session Link</label>
                    <div style="display:flex; gap:0.5rem;">
                        <input type="text" id="streamUrlInput" placeholder="Paste Direct MP4 or HLS (.m3u8) Link...">
                        <button class="btn btn-primary" id="loadStreamBtn">Load</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Your Room Identity</label>
                    <input type="text" id="usernameInput" placeholder="Anonymous Watcher">
                </div>
                <div class="input-group">
                    <label>Session Room ID</label>
                    <input type="text" id="roomIdInput" readonly>
                </div>
            </div>

            <div id="chatPanel" class="panel-content">
                <div id="chatMessageList"></div>
                <div class="chat-input-wrapper">
                    <input type="text" id="sidebarChatInput" placeholder="Send message to room...">
                    <button class="btn btn-primary" onclick="transmitMessage(false)">Send</button>
                </div>
            </div>

            <div id="peersPanel" class="panel-content">
                <div id="peerList"></div>
            </div>
        </div>

        <div id="glassInputLayer">
            <div class="glass-box">
                <h3 style="font-weight: 700;">Broadcast Broadcast Notice</h3>
                <div class="input-group">
                    <label>Notice Message</label>
                    <input type="text" id="toastMessageInput" placeholder="e.g., Taking a short break, back in 5 mins!">
                </div>
                <div style="display: flex; gap: 0.75rem; justify-content: flex-end;">
                    <button class="btn" onclick="toggleGlassInput(false)">Cancel</button>
                    <button class="btn btn-primary" id="sendToastBtn">Broadcast Alert</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="nativeSubtitleFileInput" accept=".srt,.vtt" style="display: none;">
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const STORAGE_KEY = 'hbs_watch_party_crypto_key';
        let cryptoSecretKey = localStorage.getItem(STORAGE_KEY);
        if (!cryptoSecretKey) {
            cryptoSecretKey = CryptoJS.lib.WordArray.random(256/8).toString();
            localStorage.setItem(STORAGE_KEY, cryptoSecretKey);
        }

        function encryptData(payload) {
            return CryptoJS.AES.encrypt(JSON.stringify(payload), cryptoSecretKey).toString();
        }

        function decryptData(cipherText) {
            try {
                const bytes = CryptoJS.AES.decrypt(cipherText, cryptoSecretKey);
                return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
            } catch (e) { return null; }
        }

        function pushToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        let currentRoomId = urlParams.get('room');
        if (!currentRoomId) {
            currentRoomId = Math.random().toString(36).substring(2, 10);
            window.history.replaceState(null, '', `?room=${currentRoomId}`);
        }
        document.getElementById('roomIdInput').value = currentRoomId;

        let localUsername = localStorage.getItem('hbs_username') || 'Watcher_' + Math.floor(Math.random() * 1000);
        document.getElementById('usernameInput').value = localUsername;
        document.getElementById('usernameInput').addEventListener('input', (e) => {
            localUsername = e.target.value.trim() || 'Anonymous';
            localStorage.setItem('hbs_username', localUsername);
            announcePresence();
        });

        const pusher = new Pusher('994025bf35bfbc7a0300', { cluster: 'ap2', forceTLS: true });
        const channel = pusher.subscribe(`private-watch-room-${currentRoomId}`);

        let activePeers = {};
        function announcePresence() {
            transmitBroadcast('presence-ping', { user: localUsername, timestamp: Date.now() });
        }
        setInterval(announcePresence, 10000);

        function transmitBroadcast(event, data) {
            const cipher = encryptData(data);
            channel.trigger(`client-${event}`, { payload: cipher });
        }

        channel.bind('client-presence-ping', (envelope) => {
            const data = decryptData(envelope.payload);
            if (!data) return;
            activePeers[data.user] = Date.now();
            rebuildPeerInterface();
        });

        function rebuildPeerInterface() {
            const now = Date.now();
            const list = document.getElementById('peerList');
            list.innerHTML = '';
            let count = 1;
            
            const myItem = document.createElement('div');
            myItem.className = 'peer-item';
            myItem.innerHTML = `<div class="peer-info"><div class="peer-avatar">${localUsername.charAt(0).toUpperCase()}</div><span>${localUsername} (You)</span></div><div class="peer-status"></div>`;
            list.appendChild(myItem);

            for (const [peerName, lastSeen] of Object.entries(activePeers)) {
                if (now - lastSeen < 15000) {
                    count++;
                    const item = document.createElement('div');
                    item.className = 'peer-item';
                    item.innerHTML = `<div class="peer-info"><div class="peer-avatar">${peerName.charAt(0).toUpperCase()}</div><span>${peerName}</span></div><div class="peer-status"></div>`;
                    list.appendChild(item);
                }
            }
            document.getElementById('peerCount').innerText = count;
        }

        const videoElement = document.getElementById('player');
        let hlsInstance = null;
        let isProcessingInternalEvent = false;

        const player = new Plyr(videoElement, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'pip', 'fullscreen'],
            seekTime: 10,
            ratio: '16:9',
            captions: { active: true, update: true, language: 'en' }
        });

        function switchMediaStream(url, shouldBroadcast = false) {
            if (!url) return;
            document.getElementById('streamUrlInput').value = url;
            
            // Clear prior custom text tracks inside the browser instance safely
            while (videoElement.toElement?.id === 'customTrack' || videoElement.querySelector('#customTrack')) {
                const oldTrk = videoElement.querySelector('#customTrack');
                if (oldTrk) oldTrk.remove();
            }
            if (videoElement.textTracks) {
                for (let i = 0; i < videoElement.textTracks.length; i++) {
                    videoElement.textTracks[i].mode = 'disabled';
                }
            }

            if (Hls.isSupported() && url.includes('.m3u8')) {
                if (hlsInstance) hlsInstance.destroy();
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoElement);
            } else {
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                videoElement.src = url;
            }

            if (shouldBroadcast) {
                transmitBroadcast('media-source-change', { url: url, timestamp: Date.now() });
                pushToast('Broadcasted stream link to the room!', 'success');
            }
        }

        document.getElementById('loadStreamBtn').addEventListener('click', () => {
            switchMediaStream(document.getElementById('streamUrlInput').value.trim(), true);
        });

        player.on('play', () => {
            if (isProcessingInternalEvent) return;
            transmitBroadcast('playback-state', { state: 'play', time: player.currentTime });
        });
        player.on('pause', () => {
            if (isProcessingInternalEvent) return;
            transmitBroadcast('playback-state', { state: 'pause', time: player.currentTime });
        });
        player.on('seeked', () => {
            if (isProcessingInternalEvent) return;
            transmitBroadcast('playback-state', { state: 'seek', time: player.currentTime });
        });

        channel.bind('client-media-source-change', (envelope) => {
            const data = decryptData(envelope.payload);
            if (data) {
                pushToast('Host changed video source file link', 'info');
                switchMediaStream(data.url, false);
            }
        });

        channel.bind('client-playback-state', (envelope) => {
            const data = decryptData(envelope.payload);
            if (!data) return;
            isProcessingInternalEvent = true;
            if (data.state === 'play' && player.paused) player.play();
            else if (data.state === 'pause' && !player.paused) player.pause();
            
            if (Math.abs(player.currentTime - data.time) > 1.5) {
                player.currentTime = data.time;
            }
            setTimeout(() => { isProcessingInternalEvent = false; }, 100);
        });

        document.getElementById('forceSyncBtn').addEventListener('click', () => {
            transmitBroadcast('playback-state', { state: player.paused ? 'pause' : 'play', time: player.currentTime });
            pushToast('Forced room alignment transmission sent', 'success');
        });

        /* --- SUBTITLE ENGINE & HANDSHAKE TRACKING SYSTEM --- */
        let subTimingOffset = 0.0;
        let subFontSize = 100;
        let subVerticalLift = 40;
        let subOpacity = 100;

        let currentTransferId = null;
        let outboundTotalChunks = 0;
        let confirmedPeersForCurrentTransfer = new Set();

        let receivedSubChunks = {};
        const CHUNK_SIZE = 9000;

        // Custom styling dynamic injector
        function forceApplySubtitleStyleEngine() {
            let styleNode = document.getElementById('customSubtitleEngineStyles');
            if (!styleNode) {
                styleNode = document.createElement('style');
                styleNode.id = 'customSubtitleEngineStyles';
                document.head.appendChild(styleNode);
            }
            styleNode.innerHTML = `
                .plyr__caption {
                    font-size: ${subFontSize}% !important;
                    bottom: ${subVerticalLift}px !important;
                    opacity: ${subOpacity / 100} !important;
                    transform: translateY(${subTimingOffset * 0}px);
                }
            `;
            // Apply programmatic delay directly to track cues
            if (videoElement.textTracks && videoElement.textTracks.length > 0) {
                for (let t = 0; t < videoElement.textTracks.length; t++) {
                    const track = videoElement.textTracks[t];
                    if (track.mode === 'showing' || track.mode === 'hidden') {
                        const cues = track.cues;
                        if (cues) {
                            // Track adjustments can be cleanly applied if cues are shifted relative to offset
                        }
                    }
                }
            }
        }

        // Native Injection Engine into Plyr Settings Gear Drawer
        player.on('ready', () => {
            setTimeout(injectSubtitleOptionsIntoNativePlayerSettings, 600);
        });

        function injectSubtitleOptionsIntoNativePlayerSettings() {
            const menuContainer = document.querySelector('.plyr__menu__container [role="menu"]');
            if (!menuContainer || document.getElementById('plyr-native-custom-sub-trigger')) return;

            // 1. Create sub panel trigger row in main menu list
            const triggerButton = document.createElement('button');
            triggerButton.type = 'button';
            triggerButton.id = 'plyr-native-custom-sub-trigger';
            triggerButton.className = 'plyr__menu__components';
            triggerButton.setAttribute('role', 'menuitem');
            triggerButton.setAttribute('aria-haspopup', 'true');
            triggerButton.style.width = '100%';
            triggerButton.style.display = 'flex';
            triggerButton.style.justifyContent = 'space-between';
            triggerButton.style.alignItems = 'center';
            triggerButton.style.padding = '7px 12px';
            triggerButton.style.background = 'transparent';
            triggerButton.style.border = '0';
            triggerButton.style.color = '#text-color';
            triggerButton.style.cursor = 'pointer';
            triggerButton.innerHTML = `
                <span style="display:flex;align-items:center;gap:8px;">💬 Subtitle Adjustments</span>
                <span style="opacity:0.5;font-size:11px;">Configure ›</span>
            `;

            menuContainer.appendChild(triggerButton);

            // 2. Build the actual slide drawer inside Plyr panels list container
            const panelsContainer = document.querySelector('.plyr__menu__container');
            
            const customPanel = document.createElement('div');
            customPanel.id = 'plyr-native-subtitle-panel';
            customPanel.setAttribute('role', 'menu');
            customPanel.style.display = 'none';
            customPanel.innerHTML = `
                <div style="padding: 8px 12px; border-bottom: 1px solid var(--border-color); display:flex; align-items:center; gap:8px;">
                    <button type="button" id="plyr-sub-panel-back" style="background:none;border:none;color:#fff;cursor:pointer;font-weight:bold;font-size:14px;">‹</button>
                    <span style="font-weight:600; font-size:13px;">Subtitle Options</span>
                </div>
                <div data-plyr="custom-subtitle-settings">
                    <div class="plyr-subtitle-row">
                        <span class="plyr-subtitle-label">Sync Delay</span>
                        <div class="plyr-subtitle-controls">
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('delay', -0.1)">-</button>
                            <span class="plyr-subtitle-val" id="val-sub-delay">0.0s</span>
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('delay', 0.1)">+</button>
                        </div>
                    </div>
                    <div class="plyr-subtitle-row">
                        <span class="plyr-subtitle-label">Text Size</span>
                        <div class="plyr-subtitle-controls">
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('size', -10)">-</button>
                            <span class="plyr-subtitle-val" id="val-sub-size">100%</span>
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('size', 10)">+</button>
                        </div>
                    </div>
                    <div class="plyr-subtitle-row">
                        <span class="plyr-subtitle-label">Vertical Lift</span>
                        <div class="plyr-subtitle-controls">
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('lift', -5)">-</button>
                            <span class="plyr-subtitle-val" id="val-sub-lift">40px</span>
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('lift', 5)">+</button>
                        </div>
                    </div>
                    <div class="plyr-subtitle-row">
                        <span class="plyr-subtitle-label">Opacity</span>
                        <div class="plyr-subtitle-controls">
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('opacity', -10)">-</button>
                            <span class="plyr-subtitle-val" id="val-sub-opacity">100%</span>
                            <button type="button" class="plyr-subtitle-btn" onclick="tweakSubSetting('opacity', 10)">+</button>
                        </div>
                    </div>
                    <button type="button" class="plyr-subtitle-upload-btn" id="nativeSubUploadClicker">📂 Upload Subtitle File (.srt/.vtt)</button>
                </div>
            `;
            panelsContainer.appendChild(customPanel);

            // 3. Setup panel navigation toggles mapping inside plyr settings drawer
            triggerButton.addEventListener('click', (e) => {
                e.stopPropagation();
                menuContainer.style.display = 'none';
                customPanel.style.display = 'block';
            });

            document.getElementById('plyr-sub-panel-back').addEventListener('click', (e) => {
                e.stopPropagation();
                customPanel.style.display = 'none';
                menuContainer.style.display = 'block';
            });

            document.getElementById('nativeSubUploadClicker').addEventListener('click', () => {
                document.getElementById('nativeSubtitleFileInput').click();
            });
        }

        window.tweakSubSetting = function(type, delta) {
            if (type === 'delay') {
                subTimingOffset = parseFloat((subTimingOffset + delta).toFixed(1));
                document.getElementById('val-sub-delay').innerText = `${subTimingOffset > 0 ? '+' : ''}${subTimingOffset}s`;
                // Adjust cue alignment instantly
                if (videoElement.textTracks) {
                    for (let i = 0; i < videoElement.textTracks.length; i++) {
                        let track = videoElement.textTracks[i];
                        if (track.cues) {
                            for (let j = 0; j < track.cues.length; j++) {
                                track.cues[j].startTime += delta;
                                track.cues[j].endTime += delta;
                            }
                        }
                    }
                }
            } else if (type === 'size') {
                subFontSize = Math.max(60, Math.min(200, subFontSize + delta));
                document.getElementById('val-sub-size').innerText = `${subFontSize}%`;
            } else if (type === 'lift') {
                subVerticalLift = Math.max(10, Math.min(150, subVerticalLift + delta));
                document.getElementById('val-sub-lift').innerText = `${subVerticalLift}px`;
            } else if (type === 'opacity') {
                subOpacity = Math.max(20, Math.min(100, subOpacity + delta));
                document.getElementById('val-sub-opacity').innerText = `${subOpacity}%`;
            }
            forceApplySubtitleStyleEngine();
        };

        // File reader and chunk dispatcher logic
        document.getElementById('nativeSubtitleFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                let text = evt.target.result;
                if (file.name.endsWith('.srt')) {
                    text = convertSrtToVtt(text);
                }
                broadcastSubtitleTrackInChunks(text);
            };
            reader.readAsText(file);
        });

        function convertSrtToVtt(srtText) {
            let vtt = srtText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            vtt = vtt.replace(/,([0-9]{3})/g, '.$1');
            const lines = vtt.split('\n');
            let output = 'WEBVTT\n\n';
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('-->')) {
                    output += lines[i] + '\n';
                } else if (isNaN(lines[i]) || lines[i].trim() === '') {
                    output += lines[i] + '\n';
                }
            }
            return output;
        }

        function showSyncProgressBadge(text, showSpinner = true) {
            const badge = document.getElementById('syncProgressBadge');
            const txt = document.getElementById('syncProgressText');
            badge.style.display = 'flex';
            txt.innerText = text;
            badge.querySelector('.spinner').style.display = showSpinner ? 'inline-block' : 'none';
        }

        function hideSyncProgressBadge() {
            document.getElementById('syncProgressBadge').style.display = 'none';
        }

        function broadcastSubtitleTrackInChunks(vttContent) {
            currentTransferId = 'tx_' + Date.now();
            confirmedPeersForCurrentTransfer.clear();
            
            const chunks = [];
            for (let i = 0; i < vttContent.length; i += CHUNK_SIZE) {
                chunks.push(vttContent.substring(i, i + CHUNK_SIZE));
            }

            outboundTotalChunks = chunks.length;
            const overallPeersCount = parseInt(document.getElementById('peerCount').innerText) - 1;

            if (overallPeersCount <= 0) {
                showSyncProgressBadge("Processing local track setup...", true);
            } else {
                showSyncProgressBadge(`Uploading custom track... (0/${overallPeersCount} synced room friends)`, true);
            }

            chunks.forEach((chunk, index) => {
                setTimeout(() => {
                    transmitBroadcast('subtitle-chunk', {
                        transferId: currentTransferId,
                        index: index,
                        total: chunks.length,
                        data: chunk
                    });

                    // Self injection for host execution structure directly loop
                    if (index === chunks.length - 1) {
                        assembleAndApplyReceivedSubtitle(currentTransferId, chunks);
                        if (overallPeersCount <= 0) {
                            setTimeout(() => {
                                showSyncProgressBadge("✓ Subtitle loaded successfully!", false);
                                setTimeout(hideSyncProgressBadge, 2500);
                            }, 800);
                        }
                    }
                }, index * 40); 
            });
        }

        // Chunk receiver engine mapping assembly blocks
        channel.bind('client-subtitle-chunk', (envelope) => {
            const data = decryptData(envelope.payload);
            if (!data) return;

            if (!receivedSubChunks[data.transferId]) {
                receivedSubChunks[data.transferId] = new Array(data.total).fill(null);
                showSyncProgressBadge("Receiving host subtitle file data stream...", true);
            }

            receivedSubChunks[data.transferId][data.index] = data.data;

            if (receivedSubChunks[data.transferId].every(ch => ch !== null)) {
                assembleAndApplyReceivedSubtitle(data.transferId, receivedSubChunks[data.transferId]);
                delete receivedSubChunks[data.transferId];
                
                // Fire verification peer handshake reply event back to broadcaster node immediately
                transmitBroadcast('sub-handshake-ack', {
                    transferId: data.transferId,
                    user: localUsername
                });

                showSyncProgressBadge("✓ Track fully synced with player room!", false);
                setTimeout(hideSyncProgressBadge, 2500);
            }
        });

        // Room peer handshake confirmation reception loop mapping hook
        channel.bind('client-sub-handshake-ack', (envelope) => {
            const data = decryptData(envelope.payload);
            if (!data || data.transferId !== currentTransferId) return;

            confirmedPeersForCurrentTransfer.add(data.user);
            const overallPeersCount = parseInt(document.getElementById('peerCount').innerText) - 1;
            
            showSyncProgressBadge(`Uploading custom track... (${confirmedPeersForCurrentTransfer.size}/${overallPeersCount} synced room friends)`, true);

            if (confirmedPeersForCurrentTransfer.size >= overallPeersCount) {
                showSyncProgressBadge("✓ Subtitle loaded globally across room!", false);
                setTimeout(hideSyncProgressBadge, 3000);
            }
        });

        function assembleAndApplyReceivedSubtitle(transferId, chunksArray) {
            const combinedVtt = chunksArray.join('');
            const blob = new Blob([combinedVtt], { type: 'text/vtt' });
            const blobUrl = URL.createObjectURL(blob);

            // Clean previous tracks
            const oldTracks = videoElement.querySelectorAll('#customTrack');
            oldTracks.forEach(t => t.remove());

            const trackElement = document.createElement('track');
            trackElement.id = 'customTrack';
            trackElement.kind = 'captions';
            trackElement.label = 'Uploaded Subtitle';
            trackElement.srclang = 'en';
            trackElement.src = blobUrl;
            trackElement.default = true;

            videoElement.appendChild(trackElement);

            // Force Plyr context to reload tracks without breaking live streaming threads
            player.setCaptionsMenu(); 
            
            // Activate the track natively inside the text track lists
            setTimeout(() => {
                for (let i = 0; i < videoElement.textTracks.length; i++) {
                    if (videoElement.textTracks[i].label === 'Uploaded Subtitle') {
                        videoElement.textTracks[i].mode = 'showing';
                        player.captions.active = true;
                        player.captions.currentTrack = i;
                    } else {
                        videoElement.textTracks[i].mode = 'disabled';
                    }
                }
                forceApplySubtitleStyleEngine();
                pushToast("Subtitle track loaded into media element engine!", "success");
            }, 300);
        }

        /* --- GLOBAL CHAT & NOTICES SYSTEM --- */
        const chatTabs = document.querySelectorAll('.tabs .tab');
        chatTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                chatTabs.forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.querySelector(tab.dataset.target).classList.add('active');
            });
        });

        document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
        });

        function transmitMessage(isFullscreenMode) {
            const inputId = isFullscreenMode ? 'fullscreenChatInput' : 'sidebarChatInput';
            const input = document.getElementById(inputId);
            const msg = input.value.trim();
            if (!msg) return;

            transmitBroadcast('room-chat-msg', { user: localUsername, text: msg });
            appendChatBubble(localUsername, msg, true);
            input.value = '';
        }

        channel.bind('client-room-chat-msg', (envelope) => {
            const data = decryptData(envelope.payload);
            if (data) appendChatBubble(data.user, data.text, false);
        });

        function appendChatBubble(sender, text, isMe) {
            const container = document.getElementById('chatMessageList');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${isMe ? 'me' : 'them'}`;
            bubble.innerHTML = `<div class="chat-meta">${sender}</div><div>${text}</div>`;
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
        }

        window.toggleGlassInput = function(show) {
            document.getElementById('glassInputLayer').style.display = show ? 'flex' : 'none';
        };

        document.getElementById('sendToastBtn').addEventListener('click', () => {
            const input = document.getElementById('toastMessageInput');
            const msg = input.value.trim();
            if (!msg) return;
            transmitBroadcast('room-notice-toast', { text: msg });
            pushToast(`Room Alert Broadcasted: "${msg}"`, 'info');
            toggleGlassInput(false);
            input.value = '';
        });

        channel.bind('client-room-notice-toast', (envelope) => {
            const data = decryptData(envelope.payload);
            if (data) pushToast(`Notice: ${data.text}`, 'error');
        });

        // Initialize Native Injections Controls Grid Hooks
        player.on('ready', () => {
            const controlsGrid = document.querySelector('.plyr__controls');
            if (controlsGrid && !document.getElementById('toastNoticeTriggerBtn')) {
                const toastBtn = document.createElement('button');
                toastBtn.type = 'button';
                toastBtn.id = 'toastNoticeTriggerBtn';
                toastBtn.className = 'custom-player-toggle';
                toastBtn.innerHTML = '📢 Alert';
                toastBtn.title = 'Broadcast global visual notification text alert';
                toastBtn.addEventListener('click', () => toggleGlassInput(true));
                controlsGrid.appendChild(toastBtn);
            }
        });

        document.getElementById('sidebarChatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') transmitMessage(false); });
    </script>
</body>
</html>
