<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchParty — Together, in sync</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#12151c;
    --panel-2:#161a23;
    --accent:#7c5cff;
    --accent-2:#00d4b5;
    --text:#e8e9ee;
    --sub:#8b90a3;
    --line:#232733;
    --danger:#ff5c7a;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:radial-gradient(1200px 800px at 80% -10%, #1a1233 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow:hidden;
  }
  .app{
    display:grid;
    grid-template-columns:1fr 340px;
    height:100vh;
  }
  /* ---------- LEFT: PLAYER ---------- */
  .theater{
    display:flex;
    flex-direction:column;
    padding:18px 22px;
    min-width:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .brand .dot{
    width:12px;height:12px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 0 14px var(--accent);
  }
  .brand h1{
    font-size:17px;
    letter-spacing:0.5px;
    margin:0;
    font-weight:700;
  }
  .brand span{color:var(--sub); font-size:12px; margin-left:auto;}

  .searchbar{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .searchbar input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:12px 14px;
    border-radius:10px;
    font-size:14px;
    outline:none;
    transition:border-color .15s;
  }
  .searchbar input:focus{border-color:var(--accent);}
  .searchbar button{
    background:linear-gradient(135deg,var(--accent),#5b3df0);
    border:none;
    color:white;
    padding:0 20px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    font-size:14px;
  }
  .searchbar button:hover{filter:brightness(1.1);}

  .player-wrap{
    position:relative;
    flex:1;
    background:#000;
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
  }
  #videoEl, #ytFrame{
    width:100%;
    height:100%;
    display:none;
    background:#000;
  }
  .placeholder{
    color:var(--sub);
    text-align:center;
    padding:30px;
  }
  .placeholder .icon{font-size:44px; margin-bottom:10px; opacity:.6;}

  .controls{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:14px 16px 12px;
    background:linear-gradient(0deg, rgba(0,0,0,.85), rgba(0,0,0,0));
    display:flex;
    flex-direction:column;
    gap:8px;
    opacity:0;
    transform:translateY(6px);
    transition:opacity .2s, transform .2s;
    z-index: 10;
  }
  .player-wrap:hover .controls, .player-wrap.show-controls .controls{
    opacity:1; transform:translateY(0);
  }
  .seek{
    width:100%;
    -webkit-appearance:none;
    height:5px;
    border-radius:3px;
    background:rgba(255,255,255,.2);
    cursor:pointer;
  }
  .seek::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:13px;height:13px;border-radius:50%;
    background:var(--accent-2);
    box-shadow:0 0 6px var(--accent-2);
    cursor:pointer;
  }
  .btn-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .ctrl-btn{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    color:var(--text);
    width:38px;height:38px;
    border-radius:9px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    transition:background .15s, transform .1s;
  }
  .ctrl-btn:hover{background:rgba(255,255,255,.18);}
  .ctrl-btn:active{transform:scale(.92);}
  .ctrl-btn.big{width:44px;height:44px; font-size:18px;}
  .time{
    color:var(--sub);
    font-size:12px;
    font-variant-numeric:tabular-nums;
    min-width:92px;
    text-align:center;
  }
  .vol-wrap{
    display:flex; align-items:center; gap:6px;
  }
  .vol-wrap input[type=range]{
    width:80px;
    -webkit-appearance:none;
    height:4px;
    border-radius:2px;
    background:rgba(255,255,255,.25);
  }
  .vol-wrap input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:11px;height:11px;border-radius:50%;
    background:white;
    cursor:pointer;
  }
  .spacer{flex:1;}
  .sync-btn{
    background:linear-gradient(135deg,var(--accent-2),#00a68f);
    border:none;
    color:#00251f;
    font-weight:700;
    font-size:12.5px;
    padding:0 14px;
    height:34px;
    border-radius:9px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .sync-btn:hover{filter:brightness(1.08);}
  .sync-btn:active{transform:scale(.96);}
  .status-strip{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:10px;
    font-size:12px;
    color:var(--sub);
  }
  .status-strip .pill{
    display:flex; align-items:center; gap:6px;
    background:var(--panel);
    border:1px solid var(--line);
    padding:5px 10px;
    border-radius:20px;
  }
  .status-strip .led{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent-2);
  }
  .led.warn{background:#ffb84d;}
  .led.bad{background:var(--danger);}

  /* ---------- RIGHT: CHAT ---------- */
  .chat{
    background:var(--panel);
    border-left:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .chat-head{
    padding:16px 16px 12px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .chat-head h2{
    font-size:14px;
    margin:0;
    letter-spacing:.3px;
  }
  .chat-head .members{
    font-size:11px;
    color:var(--sub);
    background:var(--panel-2);
    padding:4px 8px;
    border-radius:20px;
  }
  .name-row{
    padding:10px 16px;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:8px;
  }
  .name-row input{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:8px 10px;
    border-radius:8px;
    font-size:12.5px;
    outline:none;
  }
  .messages{
    flex:1;
    overflow-y:auto;
    padding:14px 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}
  .msg{
    max-width:88%;
    padding:8px 11px;
    border-radius:12px;
    background:var(--panel-2);
    font-size:13.5px;
    line-height:1.4;
    word-wrap:break-word;
    align-self:flex-start;
  }
  .msg.me{
    align-self:flex-end;
    background:linear-gradient(135deg,var(--accent),#5b3df0);
    color:white;
  }
  .msg.sys{
    align-self:center;
    background:transparent;
    color:var(--sub);
    font-size:11.5px;
    font-style:italic;
  }
  .msg .who{
    font-size:11px;
    opacity:.7;
    margin-bottom:2px;
    font-weight:600;
  }
  .msg.emoji-only{
    font-size:26px;
    background:transparent;
    padding:2px 4px;
  }
  .chat-input-area{
    border-top:1px solid var(--line);
    padding:10px 12px 12px;
    position:relative;
  }
  .emoji-panel{
    position:absolute;
    bottom:56px;
    right:12px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px;
    display:none;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    width:270px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  .emoji-panel.open{display:grid;}
  .emoji-panel button{
    background:none;
    border:none;
    font-size:19px;
    cursor:pointer;
    padding:4px;
    border-radius:6px;
  }
  .emoji-panel button:hover{background:var(--line);}
  .input-row{
    display:flex;
    gap:6px;
    align-items:center;
  }
  .input-row input{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 12px;
    border-radius:10px;
    font-size:13.5px;
    outline:none;
  }
  .input-row input:focus{border-color:var(--accent);}
  .icon-btn{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    width:38px;height:38px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{background:var(--line);}
  .send-btn{
    background:linear-gradient(135deg,var(--accent),#5b3df0);
    border:none;
    color:white;
    font-weight:700;
  }

  ::selection{background:var(--accent); color:white;}
</style>
</head>
<body>
<div class="app">

  <div class="theater">
    <div class="brand">
      <div class="dot"></div>
      <h1>WatchParty</h1>
      <span id="roomLabel">room: living-room</span>
    </div>

    <div class="searchbar">
      <input id="linkInput" type="text" placeholder="Paste a video link (direct .mp4/.webm or YouTube URL) and press Enter…">
      <button id="loadBtn">Load</button>
    </div>

    <div class="player-wrap" id="playerWrap">
      <div class="placeholder" id="placeholder">
        <div class="icon">🎬</div>
        <div>Paste a link above to start the party</div>
      </div>
      <video id="videoEl" playsinline></video>
      <div id="ytFrame"></div>

      <div class="controls" id="controlsBar">
        <input type="range" class="seek" id="seekBar" min="0" max="100" value="0" step="0.1">
        <div class="btn-row">
          <button class="ctrl-btn" id="backBtn" title="Back 10s">⏪</button>
          <button class="ctrl-btn big" id="playBtn" title="Play/Pause">▶️</button>
          <button class="ctrl-btn" id="fwdBtn" title="Forward 10s">⏩</button>
          <div class="time" id="timeLabel">0:00 / 0:00</div>

          <div class="vol-wrap">
            <span id="volIcon">🔊</span>
            <input type="range" id="volSlider" min="0" max="100" value="80">
          </div>

          <div class="spacer"></div>
          <button class="sync-btn" id="syncBtn" title="Resync to host time">🔄 Sync</button>
          <button class="ctrl-btn" id="fsBtn" title="Fullscreen">⛶</button>
        </div>
      </div>
    </div>

    <div class="status-strip">
      <div class="pill"><span class="led" id="connLed"></span><span id="connText">Connected (this browser)</span></div>
      <div class="pill">👥 <span id="peopleCount">1</span> watching</div>
      <div class="pill">⏱ drift: <span id="driftLabel">0.0s</span></div>
    </div>
  </div>

  <div class="chat">
    <div class="chat-head">
      <h2>💬 Party Chat</h2>
      <div class="members" id="memberPill">1 online</div>
    </div>
    <div class="name-row">
      <input id="nameInput" type="text" placeholder="Your name" maxlength="18">
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-area">
      <div class="emoji-panel" id="emojiPanel"></div>
      <div class="input-row">
        <button class="icon-btn" id="emojiBtn" title="Emojis">😊</button>
        <input id="chatInput" type="text" placeholder="Say something…" maxlength="300">
        <button class="icon-btn send-btn" id="sendBtn" title="Send">➤</button>
      </div>
    </div>
  </div>

</div>

<script>
const ROOM = new URLSearchParams(location.search).get('room') || 'living-room';
document.getElementById('roomLabel').textContent = 'room: ' + ROOM;

// ---------- Simple pluggable channel (BroadcastChannel based) ----------
const Channel = (() => {
  const bc = ('BroadcastChannel' in window) ? new BroadcastChannel('watchparty-' + ROOM) : null;
  const listeners = [];
  const clientId = Math.random().toString(36).slice(2, 9);

  if (bc) {
    bc.onmessage = (e) => listeners.forEach(fn => fn(e.data));
  }

  return {
    id: clientId,
    send(payload) {
      const msg = { ...payload, _from: clientId, _t: Date.now() };
      if (bc) bc.postMessage(msg);
    },
    onMessage(fn) { listeners.push(fn); }
  };
})();

// ---------- Presence ----------
let peopleSeen = new Set([Channel.id]);
function bumpPeople(id){
  peopleSeen.add(id);
  document.getElementById('peopleCount').textContent = peopleSeen.size;
  document.getElementById('memberPill').textContent = peopleSeen.size + ' online';
}
setInterval(() => Channel.send({type:'presence'}), 4000);
bumpPeople(Channel.id);

// ========================= PLAYER =========================
const videoEl = document.getElementById('videoEl');
const ytFrame = document.getElementById('ytFrame');
const placeholder = document.getElementById('placeholder');
const linkInput = document.getElementById('linkInput');
const loadBtn = document.getElementById('loadBtn');
const playBtn = document.getElementById('playBtn');
const backBtn = document.getElementById('backBtn');
const fwdBtn = document.getElementById('fwdBtn');
const seekBar = document.getElementById('seekBar');
const timeLabel = document.getElementById('timeLabel');
const volSlider = document.getElementById('volSlider');
const volIcon = document.getElementById('volIcon');
const fsBtn = document.getElementById('fsBtn');
const syncBtn = document.getElementById('syncBtn');
const playerWrap = document.getElementById('playerWrap');
const driftLabel = document.getElementById('driftLabel');
const connLed = document.getElementById('connLed');
const connText = document.getElementById('connText');

let mode = null; // 'video' | 'youtube'
let ytPlayer = null;
let suppressBroadcast = false; 
let lastKnownRemoteState = null; 
let currentSrc = null;

function fmtTime(s){
  if (!isFinite(s) || s < 0) s = 0;
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}

function isYouTube(url){
  return /youtu\.?be/.test(url);
}
function getYouTubeId(url){
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : null;
}

// FIX: Set the callback target BEFORE dropping the script tag onto the DOM to prevent caching race conditions
function loadYouTubeAPI(cb){
  if (window.YT && window.YT.Player) { cb(); return; }
  window.onYouTubeIframeAPIReady = cb;
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
}

function loadLink(url, fromRemote=false){
  if (!url) return;
  placeholder.style.display = 'none';
  currentSrc = url;

  if (isYouTube(url)) {
    const id = getYouTubeId(url);
    if (!id) { alert('Could not parse that YouTube link.'); return; }
    
    // Shut down native video player so audio doesn't cross over
    videoEl.pause();
    videoEl.style.display = 'none';
    videoEl.src = ""; 
    
    mode = 'youtube';
    ytFrame.style.display = 'block';

    loadYouTubeAPI(() => {
      // FIX: Reuse the existing instance via loadVideoById instead of blowing up the structural DOM element
      if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
        ytPlayer.loadVideoById(id);
      } else {
        ytPlayer = new YT.Player('ytFrame', {
          videoId: id,
          playerVars: { autoplay: 1, playsinline: 1, controls: 0, rel: 0 },
          events: {
            onReady: () => { ytPlayer.setVolume(volSlider.value); startTicking(); },
            onStateChange: onYTStateChange
          }
        });
      }
    });
  } else {
    // Shut down YouTube video if active before firing native video assets
    if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
      ytPlayer.pauseVideo();
    }
    ytFrame.style.display = 'none';

    mode = 'video';
    videoEl.style.display = 'block';
    videoEl.src = url;
    videoEl.volume = volSlider.value/100;
    videoEl.play().catch(()=>{});
    startTicking();
  }

  addSystemMsg((fromRemote ? 'Host' : 'You') + ' loaded a new video 🎬');

  if (!fromRemote) {
    Channel.send({type:'load', url});
  }
}

loadBtn.addEventListener('click', () => loadLink(linkInput.value.trim()));
linkInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadLink(linkInput.value.trim()); });

function onYTStateChange(e){
  if (suppressBroadcast) return;
  if (e.data === YT.PlayerState.PLAYING) broadcastState(true);
  if (e.data === YT.PlayerState.PAUSED) broadcastState(false);
}

function getCurrentTime(){
  if (mode === 'video') return videoEl.currentTime || 0;
  if (mode === 'youtube' && ytPlayer && typeof ytPlayer.getCurrentTime === 'function') return ytPlayer.getCurrentTime() || 0;
  return 0;
}
function getDuration(){
  if (mode === 'video') return videoEl.duration || 0;
  if (mode === 'youtube' && ytPlayer && typeof ytPlayer.getDuration === 'function') return ytPlayer.getDuration() || 0;
  return 0;
}
function isPlaying(){
  if (mode === 'video') return !videoEl.paused;
  if (mode === 'youtube' && ytPlayer && typeof ytPlayer.getPlayerState === 'function') return ytPlayer.getPlayerState() === 1;
  return false;
}
function seekTo(t){
  if (mode === 'video') videoEl.currentTime = t;
  if (mode === 'youtube' && ytPlayer && typeof ytPlayer.seekTo === 'function') ytPlayer.seekTo(t, true);
}
function playMedia(){
  if (mode === 'video') videoEl.play().catch(()=>{});
  if (mode === 'youtube' && ytPlayer && typeof ytPlayer.playVideo === 'function') ytPlayer.playVideo();
}
function pauseMedia(){
  if (mode === 'video') videoEl.pause();
  if (mode === 'youtube' && ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
}

function togglePlay(){
  if (isPlaying()) { pauseMedia(); broadcastState(false); }
  else { playMedia(); broadcastState(true); }
}
playBtn.addEventListener('click', togglePlay);
backBtn.addEventListener('click', () => { seekTo(Math.max(0, getCurrentTime()-10)); broadcastState(isPlaying()); });
fwdBtn.addEventListener('click', () => { seekTo(getCurrentTime()+10); broadcastState(isPlaying()); });

volSlider.addEventListener('input', () => {
  const v = volSlider.value;
  if (mode === 'video') videoEl.volume = v/100;
  if (mode === 'youtube' && ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(v);
  volIcon.textContent = v == 0 ? '🔇' : (v < 50 ? '🔉' : '🔊');
});

seekBar.addEventListener('input', () => {
  const dur = getDuration();
  if (dur > 0) seekTo((seekBar.value/100) * dur);
});
seekBar.addEventListener('change', () => broadcastState(isPlaying()));

fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) playerWrap.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

playerWrap.addEventListener('click', (e) => {
  if (e.target === playerWrap || e.target === placeholder) {
    playerWrap.classList.toggle('show-controls');
  }
});

function broadcastState(playing){
  if (suppressBroadcast) return;
  Channel.send({
    type:'state',
    time: getCurrentTime(),
    playing,
    src: currentSrc
  });
}

videoEl.addEventListener('play', () => { playBtn.textContent = '⏸️'; broadcastState(true); });
videoEl.addEventListener('pause', () => { playBtn.textContent = '▶️'; broadcastState(false); });

// ---------- UI tick ----------
function startTicking(){
  clearInterval(window.__tick);
  window.__tick = setInterval(() => {
    const cur = getCurrentTime(), dur = getDuration();
    if (dur > 0) seekBar.value = (cur/dur)*100;
    timeLabel.textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
    playBtn.textContent = isPlaying() ? '⏸️' : '▶️';

    if (lastKnownRemoteState) {
      const elapsedSinceUpdate = (Date.now() - lastKnownRemoteState.updatedAt)/1000;
      const expectedRemoteTime = lastKnownRemoteState.time + (lastKnownRemoteState.playing ? elapsedSinceUpdate : 0);
      const drift = Math.abs(expectedRemoteTime - cur);
      driftLabel.textContent = drift.toFixed(1) + 's';
      if (drift > 6) { connLed.className = 'led bad'; connText.textContent = 'Falling behind — hit Sync'; }
      else if (drift > 2) { connLed.className = 'led warn'; connText.textContent = 'Slight drift'; }
      else { connLed.className = 'led'; connText.textContent = 'In sync'; }
    }
  }, 400);
}

// ---------- SYNC BUTTON ----------
syncBtn.addEventListener('click', () => {
  Channel.send({type:'request-state'});
  syncBtn.textContent = '⏳ Syncing…';
  setTimeout(() => { syncBtn.innerHTML = '🔄 Sync'; }, 900);

  if (lastKnownRemoteState) {
    applyRemoteState(lastKnownRemoteState, true);
  }
});

function applyRemoteState(state, hardSnap=false){
  if (!state) return;
  suppressBroadcast = true;

  if (state.src && state.src !== currentSrc) {
    loadLink(state.src, true);
  }

  const elapsed = (Date.now() - state.updatedAt)/1000;
  const targetTime = state.time + (state.playing ? Math.max(0, elapsed) : 0);
  const drift = Math.abs(targetTime - getCurrentTime());

  if (hardSnap || drift > 4) {
    seekTo(targetTime);
  }
  if (state.playing) playMedia(); else pauseMedia();

  setTimeout(() => { suppressBroadcast = false; }, 300);
}

// ---------- Incoming channel messages ----------
Channel.onMessage((data) => {
  if (data._from === Channel.id) return;
  bumpPeople(data._from);

  if (data.type === 'presence') return;

  if (data.type === 'load') {
    loadLink(data.url, true);
  }

  if (data.type === 'state') {
    lastKnownRemoteState = { time: data.time, playing: data.playing, updatedAt: data._t, src: data.src };
    applyRemoteState(lastKnownRemoteState, false);
  }

  if (data.type === 'request-state') {
    Channel.send({ type:'state', time:getCurrentTime(), playing:isPlaying(), src: currentSrc });
  }

  if (data.type === 'chat') {
    renderMessage(data.name, data.text, false, data.emojiOnly);
  }
});

// ========================= CHAT =========================
const messagesEl = document.getElementById('messages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const nameInput = document.getElementById('nameInput');
const emojiBtn = document.getElementById('emojiBtn');
const emojiPanel = document.getElementById('emojiPanel');

nameInput.value = localStorage.getItem('wp-name') || ('Guest' + Math.floor(Math.random()*900+100));
nameInput.addEventListener('change', () => localStorage.setItem('wp-name', nameInput.value));

const EMOJIS = ['😀','😂','😍','😎','🥳','😭','😱','👍','👎','❤️','🔥','🎉','👏','🍿','😴','🤔','💀','😡','👀','🙌','🤝','😅','🥲','🤯','🫡','💯','🙈','🎬'];
EMOJIS.forEach(em => {
  const b = document.createElement('button');
  b.textContent = em;
  b.addEventListener('click', () => {
    sendChat(em, true);
    emojiPanel.classList.remove('open');
  });
  emojiPanel.appendChild(b);
});

emojiBtn.addEventListener('click', () => emojiPanel.classList.toggle('open'));
document.addEventListener('click', (e) => {
  if (!emojiPanel.contains(e.target) && e.target !== emojiBtn) emojiPanel.classList.remove('open');
});

function addSystemMsg(text){
  const d = document.createElement('div');
  d.className = 'msg sys';
  d.textContent = text;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMessage(name, text, isMe, emojiOnly=false){
  const wrap = document.createElement('div');
  wrap.className = 'msg' + (isMe ? ' me' : '') + (emojiOnly ? ' emoji-only' : '');
  if (!emojiOnly) {
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = name;
    wrap.appendChild(who);
  }
  const body = document.createElement('div');
  body.textContent = text;
  wrap.appendChild(body);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendChat(text, emojiOnly=false){
  if (!text.trim()) return;
  const name = nameInput.value || 'Guest';
  renderMessage(name, text, true, emojiOnly);
  Channel.send({ type:'chat', name, text, emojiOnly });
  chatInput.value = '';
}

sendBtn.addEventListener('click', () => sendChat(chatInput.value, false));
chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(chatInput.value, false); });

addSystemMsg('Welcome to the party! Paste a link on the left to begin. 🎉');
</script>
</body>
</html>
