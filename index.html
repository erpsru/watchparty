<!DOCTYPE html>
<html lang=\"en\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>HBS Pro</title>

    <link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css\" />
    <script src=\"https://js.pusher.com/8.0/pusher.min.js\"></script>
    <script src=\"https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js\"></script>
    <script src=\"https://cdn.jsdelivr.net/npm/hls.js@latest\"></script>
    <script src=\"https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js\"></script>

    <style>
        :root {
            --bg-color: #0b0b0e;
            --panel-bg: rgba(20, 20, 27, 0.75);
            --accent-color: #6366f1;
            --sync-color: #e11d48;
            --text-color: #f3f4f6;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(12, 12, 20, 0.82);
            --glass-border: rgba(255, 255, 255, 0.14);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .top-navbar {
            padding: 12px 20px; background: rgba(15, 15, 22, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; gap: 15px; z-index: 5; flex-wrap: wrap;
        }
        .nav-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .brand-title { font-size: 1.05rem; font-weight: 800; letter-spacing: 0.3px; color: #fff; margin-right: 6px; white-space: nowrap; }
        .media-input-wrapper { flex: 1; max-width: 600px; display: flex; gap: 8px; min-width: 260px; }

        input[type=\"text\"], select {
            background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border-color); padding: 8px 14px;
            border-radius: 6px; color: #fff; outline: none; font-size: 0.9rem;
        }
        input[type=\"text\"]:focus { border-color: var(--accent-color); }

        button {
            background: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-weight: 600; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px;
            transition: opacity 0.2s, background 0.2s; white-space: nowrap;
        }
        button:hover { opacity: 0.9; }
        button.ghost { background: rgba(255,255,255,0.08); }
        button.danger { background: var(--sync-color); }

        .app-container { display: flex; flex: 1; width: 100%; height: calc(100vh - 65px); overflow: hidden; }

        .video-section { flex: 3; min-width: 0; display: flex; flex-direction: column; justify-content: center; align-items: stretch; background: #000; position: relative; }

        .player-wrapper {
            width: 100%; max-width: calc((100vh - 65px) * 16 / 9);
            aspect-ratio: 16 / 9; margin: 0 auto; position: relative;
        }

        .player-wrapper video { object-fit: contain; }

        /* -----------------------------------------------------------------
           CUSTOM SUBTITLE OVERLAY
           We render captions ourselves instead of relying on Plyr's native
           <track> pipeline. That pipeline is what was silently broken:
             * Plyr snapshots tracks at init, so dynamically-added <track>
               elements never got wired to its .plyr__captions renderer.
             * <track src=\"...\"> requires CORS headers on the subtitle host
               and blob-URL workaround only helped uploads, not URLs.
             * Rewriting cue.startTime/endTime for timing offsets is fragile
               (some browsers reject direct cue mutation entirely).
           Fetching subtitles as text, parsing to a cue array, and drawing
           them into this overlay on `timeupdate` sidesteps all three.
           ----------------------------------------------------------------- */
        #customCaptions {
            position: absolute; left: 0; right: 0; bottom: 60px;
            text-align: center; pointer-events: none; z-index: 5;
            padding: 0 6%; font-size: var(--sub-size-val, 22px);
            opacity: var(--sub-opacity-val, 1);
            transform: translateY(calc(var(--sub-pos-val, 0px) * -1));
            transition: transform 0.1s ease, opacity 0.1s ease;
        }
        #customCaptions .cap-line {
            display: inline-block; background: rgba(0,0,0,0.65);
            color: #fff; padding: 4px 10px; border-radius: 4px;
            line-height: 1.35; text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            white-space: pre-wrap; margin: 2px 0;
        }
        /* Move overlay up while Plyr controls are visible so it doesn't sit on top of the control bar */
        .plyr:not(.plyr--hide-controls) #customCaptions { bottom: 90px; }
        .plyr--fullscreen-active #customCaptions { bottom: 90px; font-size: calc(var(--sub-size-val, 22px) * 1.4); }
        .plyr--fullscreen-active.plyr--hide-controls #customCaptions { bottom: 60px; }

        #unmutePrompt {
            display: none; position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            align-items: center; gap: 6px; background: rgba(10, 10, 15, 0.75); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); color: #fff; padding: 8px 16px; border-radius: 999px;
            font-size: 0.85rem; z-index: 12; box-shadow: 0 8px 24px rgba(0,0,0,0.4); cursor: pointer;
            animation: unmutePulse 2s ease-in-out infinite;
        }
        @keyframes unmutePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .subtitle-loading-badge {
            display: none; position: absolute; top: 64px; left: 50%; transform: translateX(-50%);
            align-items: center; gap: 8px; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); color: #fff; padding: 7px 16px; border-radius: 999px;
            font-size: 0.8rem; z-index: 12; box-shadow: 0 8px 24px rgba(0,0,0,0.4); text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }
        .subtitle-loading-badge .spinner {
            width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff; animation: spin 0.7s linear infinite; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .sidebar-section {
            flex: 1; min-width: 350px; max-width: 420px; background: var(--panel-bg); border-left: 1px solid var(--border-color);
            display: flex; flex-direction: column; backdrop-filter: blur(15px); overflow-y: auto;
        }
        .sidebar-panel { padding: 15px; border-bottom: 1px solid var(--border-color); }
        .panel-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 10px; font-weight: 700; }

        .control-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .tool-btn-group {
            display: flex; background: rgba(255,255,255,0.04); border-radius: 6px; border: 1px solid var(--border-color);
            overflow: hidden; align-items: center; justify-content: space-between;
        }
        .tool-btn-group button { background: transparent; padding: 6px 12px; border-radius: 0; }
        .tool-btn-group button:hover { background: rgba(255,255,255,0.08); }
        .tool-label { font-size: 0.8rem; padding: 0 4px; color: rgba(255,255,255,0.8); }

        .row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .row select { flex: 1; }

        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; min-height: 160px; }
        .message-bubble { background: rgba(255, 255, 255, 0.04); padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.02); word-break: break-word; }
        .message-header { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 4px; }
        .message-author { color: var(--accent-color); font-weight: bold; }
        .message-time { color: rgba(255,255,255,0.3); }

        .latency-badge { background: var(--sync-color); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; display: none; margin-left: 8px; }

        .file-upload-btn {
            position: relative; overflow: hidden; background: rgba(255,255,255,0.05); border: 1px dashed var(--border-color);
            text-align: center; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .file-upload-btn input[type=\"file\"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .plyr-fullscreen-toast-layer {
            position: absolute; bottom: 90px; right: 25px; width: 320px; display: flex; flex-direction: column; gap: 8px;
            pointer-events: none; z-index: 10; transition: bottom 0.25s ease;
        }
        .plyr--fullscreen-active.plyr--hide-controls .plyr-fullscreen-toast-layer { bottom: 25px; }

        .floating-toast {
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            padding: 10px 14px; border-radius: 10px; color: #fff; font-size: 0.9rem; word-break: break-word;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); border-left: 4px solid var(--accent-color);
            animation: toastSequence 5s forwards; cursor: pointer;
        }
        @keyframes toastSequence {
            0% { transform: translateY(25px) scale(0.95); opacity: 0; }
            8% { transform: translateY(0) scale(1); opacity: 1; }
            88% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-16px); opacity: 0; }
        }

        .plyr-fullscreen-input-layer {
            position: absolute; bottom: 80px; right: 25px; width: 320px; background: var(--glass-bg);
            backdrop-filter: blur(16px); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); z-index: 11;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease, bottom 0.25s ease;
        }
        .plyr--fullscreen-active.plyr--hide-controls .plyr-fullscreen-input-layer { bottom: 25px; }
        .plyr--hide-controls .plyr-fullscreen-input-layer.idle-hide { transform: translateY(85px); opacity: 0; pointer-events: none; }

        .plyr-fullscreen-subtitle-layer {
            position: absolute; bottom: 80px; right: 25px; width: 320px; background: var(--glass-bg);
            backdrop-filter: blur(16px); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); z-index: 11; display: none;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease, bottom 0.25s ease;
        }
        .plyr--fullscreen-active.plyr--hide-controls .plyr-fullscreen-subtitle-layer { bottom: 25px; }
        .plyr-fullscreen-subtitle-layer .panel-title {
            margin-bottom: 8px; color: rgba(255,255,255,0.75); text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .plyr-fullscreen-subtitle-layer .tool-label,
        .plyr-fullscreen-input-layer input,
        .floating-toast { text-shadow: 0 1px 3px rgba(0,0,0,0.6); }

        .custom-player-toggle {
            background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.15) !important;
            padding: 6px 10px !important; border-radius: 6px !important; font-size: 0.72rem !important;
            margin-left: 6px !important; display: flex !important; align-items: center; gap: 4px;
        }
        .custom-player-toggle.active { background: var(--accent-color) !important; border-color: var(--accent-color) !important; }

        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            .app-container { flex-direction: column; height: auto; overflow: visible; }
            .video-section { flex: none; width: 100%; position: sticky; top: 0; z-index: 10; }
            .sidebar-section { flex: none; max-width: 100%; min-width: 100%; height: auto; overflow-y: visible; }
            .top-navbar { flex-direction: column; align-items: stretch; }
            #customCaptions { font-size: calc(var(--sub-size-val, 18px)); }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
        * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) transparent; }
    </style>
</head>
<body>

    <div class=\"top-navbar\">
        <div class=\"nav-group\">
            <span class=\"brand-title\">🎬 HBS Pro</span>
            <button class=\"ghost\" onclick=\"createNewRoom()\">🆕 Create New Room</button>
            <button onclick=\"shareActiveRoom()\">🔗 Share Invite Link</button>
        </div>

        <div class=\"media-input-wrapper\">
            <input type=\"text\" id=\"videoUrlInput\" placeholder=\"Paste video link (.mp4, YouTube, or .m3u8 HLS)\">
            <button onclick=\"loadNewVideo()\">Load</button>
        </div>

        <div class=\"nav-group\">
            <button class=\"danger\" onclick=\"requestRoomSync()\">🔄 Sync to Room<span id=\"latencyBadge\" class=\"latency-badge\"></span></button>
        </div>
    </div>

    <div class=\"app-container\">

        <div class=\"video-section\">
            <div class=\"player-wrapper\" id=\"videoWrapper\">
                <video id=\"player\" playsinline controls crossorigin></video>
                <div id=\"customCaptions\"></div>
                <div id=\"toastLayer\" class=\"plyr-fullscreen-toast-layer\"></div>

                <button id=\"unmutePrompt\" type=\"button\" onclick=\"player.muted = false; hideUnmutePrompt();\">
                    🔇 Tap to unmute
                </button>

                <div id=\"subtitleSyncBadge\" class=\"subtitle-loading-badge\">
                    <span class=\"spinner\"></span> <span id=\"subtitleSyncBadgeText\">Syncing subtitle for everyone...</span>
                </div>

                <div id=\"glassInputLayer\" class=\"plyr-fullscreen-input-layer idle-hide\" style=\"display: none;\">
                    <div style=\"display:flex; gap:8px;\">
                        <input type=\"text\" id=\"fullscreenChatInput\" placeholder=\"Send quick message...\" style=\"flex:1; padding:6px 10px; font-size:0.85rem;\">
                        <button onclick=\"transmitMessage(true)\" style=\"padding:6px 12px; font-size:0.85rem;\">Send</button>
                    </div>
                </div>

                <div id=\"glassSubtitleLayer\" class=\"plyr-fullscreen-subtitle-layer idle-hide\">
                    <div class=\"panel-title\">Subtitle Timing &amp; Presentation</div>
                    <div class=\"control-grid\">
                        <div class=\"tool-btn-group\">
                            <button onclick=\"adjustSubtitleTiming(-0.1)\">-</button>
                            <span class=\"tool-label\" id=\"lblSubDelayFs\">Timing: 0.0s</span>
                            <button onclick=\"adjustSubtitleTiming(0.1)\">+</button>
                        </div>
                        <div class=\"tool-btn-group\">
                            <button onclick=\"adjustSubtitleStyling('size', -2)\">-</button>
                            <span class=\"tool-label\" id=\"lblSubSizeFs\">Size: 22px</span>
                            <button onclick=\"adjustSubtitleStyling('size', 2)\">+</button>
                        </div>
                        <div class=\"tool-btn-group\">
                            <button onclick=\"adjustSubtitleStyling('pos', -5)\">-</button>
                            <span class=\"tool-label\" id=\"lblSubPosFs\">Lift: 0px</span>
                            <button onclick=\"adjustSubtitleStyling('pos', 5)\">+</button>
                        </div>
                        <div class=\"tool-btn-group\">
                            <button onclick=\"adjustSubtitleStyling('opacity', -0.1)\">-</button>
                            <span class=\"tool-label\" id=\"lblSubOpacityFs\">Opacity: 1.0</span>
                            <button onclick=\"adjustSubtitleStyling('opacity', 0.1)\">+</button>
                        </div>
                    </div>
                    <div class=\"row\">
                        <select id=\"subtitleTrackSelectFs\" onchange=\"selectSubtitleTrack(this.value, true)\">
                            <option value=\"-1\">Subtitles: Off</option>
                        </select>
                    </div>
                    <div class=\"row\">
                        <input type=\"text\" id=\"subtitleUrlInputFs\" placeholder=\"Paste .vtt/.srt subtitle URL\">
                        <button class=\"ghost\" onclick=\"ingestSubtitleFromUrl()\">Add</button>
                    </div>
                    <div class=\"file-upload-btn\" style=\"margin-top:8px;\">
                        📂 Upload Subtitle (.vtt, .srt) &mdash; shared with the room
                        <input type=\"file\" id=\"externalSubFileFs\" accept=\".vtt,.srt\" onchange=\"ingestExternalSubtitles(this)\">
                    </div>
                </div>
            </div>
        </div>

        <div class=\"sidebar-section\">

            <div class=\"sidebar-panel\">
                <div class=\"panel-title\">User Profile</div>
                <div style=\"display: flex; gap:8px; align-items:center;\">
                    <span style=\"font-size:0.85rem; color:rgba(255,255,255,0.5);\">Name:</span>
                    <input type=\"text\" id=\"usernameInput\" value=\"\" onchange=\"updateProfileHandle()\" style=\"flex:1; padding:6px 10px;\">
                </div>
                <div style=\"font-size:0.72rem; color:rgba(255,255,255,0.35); margin-top:6px;\" id=\"roomIdLabel\"></div>
            </div>

            <div class=\"sidebar-panel\" id=\"audioTrackPanel\" style=\"display:none;\">
                <div class=\"panel-title\">Audio Language (Dual Audio)</div>
                <div class=\"row\">
                    <select id=\"audioTrackSelect\" onchange=\"selectAudioTrack(this.value, true)\"></select>
                </div>
            </div>

            <div class=\"chat-messages\" id=\"chatLog\"></div>

            <div class=\"sidebar-panel\" style=\"border-bottom:none; border-top:1px solid var(--border-color); background: rgba(0,0,0,0.15);\">
                <div style=\"display:flex; gap:8px;\">
                    <input type=\"text\" id=\"sidebarChatInput\" placeholder=\"Type a room message...\">
                    <button onclick=\"transmitMessage(false)\">Send</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // =========================================================================
        // CONFIG
        // =========================================================================
        const PUSHER_KEY = '25790a5661338b7c7756';
        const PUSHER_CLUSTER = 'ap2';
        const PUSHER_SECRET = '9a7ffd7b2858442cd939';

        let currentUsername = localStorage.getItem('party_user') || 'Guest_' + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('usernameInput').value = currentUsername;

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        const isFreshlyCreatedRoom = !roomId;
        if (!roomId) {
            roomId = Math.random().toString(36).substring(2, 13);
            window.history.replaceState({}, '', `?room=${roomId}`);
        }
        document.getElementById('roomIdLabel').innerText = 'Room: ' + roomId;

        const channelName = `private-watch-${roomId}`;

        let isSyncing = false;
        let seekInProgress = false;
        let lastSyncEventTs = 0;
        let updateTimeout;
        let hlsInstance = null;
        let localHeartbeatInterval = null;

        let subDelayOffset = 0.0;
        let subSizePx = 22;
        let subOpacityFloat = 1.0;
        let subPositionLift = 0;

        let floatingToastActive = true;
        let glassInputActive = false;
        let glassSubtitleActive = false;

        let activeVideoUrl = '';
        let currentSubtitleTrackId = -1;
        let currentAudioTrackId = -1;

        const videoElement = document.getElementById('player');
        const captionsOverlay = document.getElementById('customCaptions');

        const player = new Plyr(videoElement, {
            // captions removed from Plyr — we render them ourselves via #customCaptions
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
            settings: ['quality', 'speed'],
            ratio: '16:9'
        });

        const pusher = new Pusher(PUSHER_KEY, {
            cluster: PUSHER_CLUSTER,
            channelAuthorization: {
                transport: 'ajax',
                customHandler: function({ socketId, channelName }, callback) {
                    const stringToSign = socketId + \":\" + channelName;
                    const hash = CryptoJS.HmacSHA256(stringToSign, PUSHER_SECRET);
                    const signature = CryptoJS.enc.Hex.stringify(hash);
                    callback(null, { auth: PUSHER_KEY + \":\" + signature });
                }
            }
        });

        const watchChannel = pusher.subscribe(channelName);

        // =========================================================================
        // CUSTOM SUBTITLE ENGINE
        // Each loaded track is an entry in `subtitleTracks`:
        //   { label, cues: [{ start, end, text }] }
        // Rendering happens on the video element's `timeupdate` and a rAF loop
        // (rAF fills the gap between browser timeupdate events so cues don't
        //  visually lag on machines that fire timeupdate infrequently).
        // =========================================================================
        const subtitleTracks = [];

        function parseVttToCues(vttText) {
            // Strip BOM + WEBVTT header + NOTE/STYLE blocks; extract cues.
            const cleaned = vttText.replace(/^\uFEFF/, '').replace(/\r+/g, '');
            const lines = cleaned.split('\n');
            const cues = [];
            let i = 0;
            // Skip header up to first blank line
            if (lines[0] && lines[0].toUpperCase().startsWith('WEBVTT')) {
                while (i < lines.length && lines[i].trim() !== '') i++;
            }
            while (i < lines.length) {
                // skip blank lines
                while (i < lines.length && lines[i].trim() === '') i++;
                if (i >= lines.length) break;

                // Skip NOTE / STYLE / REGION blocks (run until blank line)
                const firstLine = lines[i].trim();
                if (/^(NOTE|STYLE|REGION)\b/i.test(firstLine)) {
                    while (i < lines.length && lines[i].trim() !== '') i++;
                    continue;
                }

                // Optional cue identifier line (no \"-->\"), then timing line
                let timingLine = lines[i];
                if (!timingLine.includes('-->')) {
                    i++;
                    if (i >= lines.length) break;
                    timingLine = lines[i];
                }
                if (!timingLine.includes('-->')) { i++; continue; }
                i++;

                const timingMatch = timingLine.match(/(\d{1,2}:)?(\d{1,2}):(\d{1,2})[.,](\d{1,3})\s*-->\s*(\d{1,2}:)?(\d{1,2}):(\d{1,2})[.,](\d{1,3})/);
                if (!timingMatch) continue;

                const toSeconds = (h, m, s, ms) => (parseInt(h || '0', 10) * 3600) + (parseInt(m, 10) * 60) + parseInt(s, 10) + (parseInt(ms, 10) / Math.pow(10, ms.length));
                const startH = timingMatch[1] ? timingMatch[1].replace(':', '') : '0';
                const endH = timingMatch[5] ? timingMatch[5].replace(':', '') : '0';
                const start = toSeconds(startH, timingMatch[2], timingMatch[3], timingMatch[4]);
                const end = toSeconds(endH, timingMatch[6], timingMatch[7], timingMatch[8]);

                const textLines = [];
                while (i < lines.length && lines[i].trim() !== '') {
                    textLines.push(lines[i]);
                    i++;
                }
                // Strip inline VTT/SSA styling tags like <i>, <b>, <c.class>, {\an8}, etc.
                const text = textLines.join('\n')
                    .replace(/\{[^}]*\}/g, '')
                    .replace(/<[^>]+>/g, '')
                    .trim();
                if (text) cues.push({ start, end, text });
            }
            return cues;
        }

        function srtToVtt(srtText) {
            const normalized = srtText.replace(/^\uFEFF/, '').replace(/\r+/g, '').trim();
            const blocks = normalized.split(/\n\n+/);
            const vttBlocks = blocks.map(block => {
                const lines = block.split('\n').filter(l => l.trim() !== '');
                if (lines.length && /^\d+$/.test(lines[0].trim())) lines.shift();
                return lines.map(line => {
                    if (line.includes('-->')) {
                        return line.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, (m, hms, ms) => `${hms}.${ms}`);
                    }
                    return line;
                }).join('\n');
            }).filter(b => b.trim() !== '');
            return 'WEBVTT\n\n' + vttBlocks.join('\n\n');
        }

        function addParsedSubtitleTrack(label, cues) {
            subtitleTracks.push({ label, cues });
            refreshSubtitleMenu();
        }

        function refreshSubtitleMenu() {
            const sel = document.getElementById('subtitleTrackSelectFs');
            sel.innerHTML = '<option value=\"-1\">Subtitles: Off</option>';
            subtitleTracks.forEach((t, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = t.label || `Track ${i}`;
                sel.appendChild(opt);
            });
            sel.value = currentSubtitleTrackId;
        }

        function selectSubtitleTrack(idx, broadcast) {
            idx = parseInt(idx, 10);
            currentSubtitleTrackId = idx;
            document.getElementById('subtitleTrackSelectFs').value = idx;
            if (idx === -1) captionsOverlay.innerHTML = '';
            renderCaptionsAtCurrentTime();
            if (broadcast) watchChannel.trigger('client-global-track', { type: 'caption', trackId: idx });
        }

        function renderCaptionsAtCurrentTime() {
            if (currentSubtitleTrackId < 0 || currentSubtitleTrackId >= subtitleTracks.length) {
                if (captionsOverlay.innerHTML) captionsOverlay.innerHTML = '';
                return;
            }
            const t = videoElement.currentTime - subDelayOffset;
            const cues = subtitleTracks[currentSubtitleTrackId].cues;
            // linear scan is fine — typical subtitle track is a few thousand cues at most
            let activeText = '';
            for (let i = 0; i < cues.length; i++) {
                const c = cues[i];
                if (t >= c.start && t <= c.end) { activeText = c.text; break; }
                if (c.start > t) break; // cues are ordered
            }
            if (activeText) {
                const lines = activeText.split('\n').map(l => `<span class=\"cap-line\">${escapeHtml(l)}</span>`).join('<br>');
                if (captionsOverlay.innerHTML !== lines) captionsOverlay.innerHTML = lines;
            } else if (captionsOverlay.innerHTML) {
                captionsOverlay.innerHTML = '';
            }
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        videoElement.addEventListener('timeupdate', renderCaptionsAtCurrentTime);
        // rAF loop for smoother caption transitions (timeupdate on some browsers fires only ~4x/sec)
        (function captionTick() {
            renderCaptionsAtCurrentTime();
            requestAnimationFrame(captionTick);
        })();

        // =========================================================================
        // PLAYER READY: relocate floating overlays into the Plyr container
        // =========================================================================
        player.on('ready', () => {
            const plyrContainer = document.querySelector('.plyr');
            if (plyrContainer) {
                plyrContainer.appendChild(captionsOverlay);
                plyrContainer.appendChild(document.getElementById('toastLayer'));
                plyrContainer.appendChild(document.getElementById('glassInputLayer'));
                plyrContainer.appendChild(document.getElementById('glassSubtitleLayer'));
                injectCustomPlayerButtons();
            }
        });

        // =========================================================================
        // LATE-JOINER CATCH-UP
        // =========================================================================
        watchChannel.bind('pusher:subscription_succeeded', () => {
            appendMessage(\"System\", \"Connected to room: \" + roomId);
            setTimeout(() => {
                watchChannel.trigger('client-request-status', { from: currentUsername });
            }, 600);
            if (isFreshlyCreatedRoom) setTimeout(shareActiveRoom, 500);
        });

        watchChannel.bind('client-request-status', () => {
            if (activeVideoUrl) {
                watchChannel.trigger('client-respond-status', {
                    url: activeVideoUrl,
                    time: player.currentTime,
                    playing: player.playing,
                    audioTrack: currentAudioTrackId,
                    subtitleTrack: currentSubtitleTrackId,
                    subDelayOffset
                });
            }
        });

        function attemptPlayWithFallback() {
            const playPromise = player.play();
            if (playPromise && typeof playPromise.catch === 'function') {
                playPromise.catch(() => {
                    player.muted = true;
                    showUnmutePrompt();
                    player.play().catch(() => {});
                });
            }
        }

        function showUnmutePrompt() { document.getElementById('unmutePrompt').style.display = 'flex'; }
        function hideUnmutePrompt() { document.getElementById('unmutePrompt').style.display = 'none'; }

        player.on('volumechange', () => { if (!player.muted) hideUnmutePrompt(); });

        watchChannel.bind('client-respond-status', (data) => {
            if (data.url && data.url !== activeVideoUrl) {
                processMediaParsing(data.url, () => {
                    beginSeekSync(data.time, data.playing);
                    subDelayOffset = data.subDelayOffset || 0;
                    syncSubtitleLabel('lblSubDelayFs', subDelayOffset);
                });
                awaitingManualSync = false;
            } else if (awaitingManualSync && data.url === activeVideoUrl) {
                awaitingManualSync = false;
                beginSeekSync(data.time, data.playing);
                appendMessage(\"System\", \"Synced to the room.\");
            }
        });

        function beginSeekSync(targetTime, shouldPlay) {
            isSyncing = true;
            seekInProgress = true;
            const clearSyncFlags = () => {
                isSyncing = false;
                seekInProgress = false;
                videoElement.removeEventListener('playing', onCaughtUp);
                videoElement.removeEventListener('canplay', onCaughtUpIfNotPlaying);
            };
            const onCaughtUp = () => clearSyncFlags();
            const onCaughtUpIfNotPlaying = () => { if (!shouldPlay) clearSyncFlags(); };
            videoElement.addEventListener('playing', onCaughtUp);
            videoElement.addEventListener('canplay', onCaughtUpIfNotPlaying);
            player.currentTime = targetTime;
            if (shouldPlay) attemptPlayWithFallback(); else player.pause();
            setTimeout(clearSyncFlags, 8000);
        }

        function stampedPayload(extra) {
            const ts = Date.now();
            lastSyncEventTs = ts;
            return Object.assign({ ts }, extra);
        }
        function isStaleEvent(data) { return typeof data.ts === 'number' && data.ts < lastSyncEventTs; }

        watchChannel.bind('client-video-play', (data) => {
            if (isStaleEvent(data)) return;
            if (typeof data.ts === 'number') lastSyncEventTs = data.ts;
            const needsSeek = Math.abs(player.currentTime - data.time) > 1.2;
            if (needsSeek) beginSeekSync(data.time, true);
            else if (!isSyncing) player.play();
        });

        watchChannel.bind('client-video-pause', (data) => {
            if (isStaleEvent(data)) return;
            if (typeof data.ts === 'number') lastSyncEventTs = data.ts;
            const needsSeek = Math.abs(player.currentTime - data.time) > 1.2;
            if (needsSeek) beginSeekSync(data.time, false);
            else player.pause();
        });

        watchChannel.bind('client-global-track', (data) => {
            if (data.type === 'audio' && hlsInstance) {
                if (hlsInstance.audioTrack !== data.trackId) {
                    hlsInstance.audioTrack = data.trackId;
                    currentAudioTrackId = data.trackId;
                    document.getElementById('audioTrackSelect').value = data.trackId;
                    appendMessage(\"System\", `Room audio switched to track ${data.trackId}`);
                }
            } else if (data.type === 'caption') {
                selectSubtitleTrack(data.trackId, false);
            } else if (data.type === 'subdelay') {
                subDelayOffset = data.value;
                syncSubtitleLabel('lblSubDelayFs', subDelayOffset);
            }
        });

        watchChannel.bind('client-heartbeat', (data) => {
            if (!player.playing || isSyncing) return;
            const absoluteDelta = data.time - player.currentTime;
            const badge = document.getElementById('latencyBadge');
            if (absoluteDelta > 1.5) {
                badge.innerText = `${absoluteDelta.toFixed(1)}s behind`;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        });

        player.on('play', () => {
            if (isSyncing) return;
            watchChannel.trigger('client-video-play', stampedPayload({ time: player.currentTime }));
            startHeartbeatBroadcast();
        });

        player.on('pause', () => {
            if (isSyncing || seekInProgress) return;
            watchChannel.trigger('client-video-pause', stampedPayload({ time: player.currentTime }));
            clearInterval(localHeartbeatInterval);
        });

        let lastSeekTargetHint = null;
        player.on('seeking', () => { lastSeekTargetHint = player.currentTime; });
        player.on('seeked', () => {
            if (isSyncing) return;
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
                const actual = player.currentTime;
                const target = lastSeekTargetHint;
                if (target !== null && target > 5 && actual < 1.5) {
                    appendMessage(\"System\", \"This video source doesn't seem to support jumping to a new position — it reset to the start.\");
                    return;
                }
                const eventName = player.playing ? 'client-video-play' : 'client-video-pause';
                watchChannel.trigger(eventName, stampedPayload({ time: actual }));
            }, 150);
        });

        function startHeartbeatBroadcast() {
            clearInterval(localHeartbeatInterval);
            localHeartbeatInterval = setInterval(() => {
                if (player.playing && !isSyncing) {
                    watchChannel.trigger('client-heartbeat', { time: player.currentTime });
                }
            }, 3000);
        }

        let awaitingManualSync = false;
        function requestRoomSync() {
            awaitingManualSync = true;
            watchChannel.trigger('client-request-status', { from: currentUsername });
            document.getElementById('latencyBadge').style.display = 'none';
            appendMessage(\"System\", \"Requesting the room's current playback position...\");
            setTimeout(() => { awaitingManualSync = false; }, 5000);
        }

        // =========================================================================
        // MEDIA LOADING
        // =========================================================================
        function loadNewVideo() {
            const targetUrl = document.getElementById('videoUrlInput').value.trim();
            if (!targetUrl) return;
            processMediaParsing(targetUrl);
            watchChannel.trigger('client-video-play', stampedPayload({ time: 0 }));
        }

        function resetSubtitleAndAudioUI() {
            document.getElementById('audioTrackSelect').innerHTML = '';
            document.getElementById('audioTrackPanel').style.display = 'none';
            currentAudioTrackId = -1;
            // NOTE: we intentionally keep loaded subtitle tracks across video changes,
            // since a viewer might load a subtitle file before the video URL.
        }

        videoElement.addEventListener('error', () => {
            const err = videoElement.error;
            let reason = \"Unknown playback error.\";
            if (err) {
                if (err.code === err.MEDIA_ERR_SRC_NOT_SUPPORTED) {
                    reason = \"This link isn't a playable video file — it may be a landing/download page rather than a direct link, or the host doesn't allow this site to load it.\";
                } else if (err.code === err.MEDIA_ERR_NETWORK) {
                    reason = \"Network error loading the video — the host may not support the request or blocked it.\";
                } else if (err.code === err.MEDIA_ERR_DECODE) {
                    reason = \"This browser can't decode this video's format/codec (common with certain MKV/HEVC files).\";
                }
            }
            appendMessage(\"System\", `Couldn't play this link: ${reason}`);
        });

        function processMediaParsing(url, executionCallback = null) {
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            resetSubtitleAndAudioUI();
            activeVideoUrl = url;
            document.getElementById('videoUrlInput').value = url;

            const ytRegExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const ytMatch = url.match(ytRegExp);

            if (ytMatch && ytMatch[2] && ytMatch[2].length === 11) {
                player.source = { type: 'video', sources: [{ src: ytMatch[2], provider: 'youtube' }] };
                appendMessage(\"System\", \"Loaded YouTube video.\");
                if (executionCallback) executionCallback();
            } else if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(videoElement);
                    hlsInstance.on(Hls.Events.ERROR, (ev, data) => {
                        if (data.fatal) appendMessage(\"System\", `Couldn't play this HLS stream (${data.details}) — the link or host may not be reachable/supported.`);
                    });
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        appendMessage(\"System\", \"HLS stream loaded.\");
                        populateHlsAudioTracks();
                        hlsInstance.on(Hls.Events.AUDIO_TRACK_SWITCHED, (ev, data) => {
                            currentAudioTrackId = data.id;
                            watchChannel.trigger('client-global-track', { type: 'audio', trackId: data.id });
                        });
                        if (executionCallback) executionCallback();
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                    if (executionCallback) executionCallback();
                }
            } else {
                player.source = { type: 'video', sources: [{ src: url }] };
                appendMessage(\"System\", \"Loaded video file.\");
                if (executionCallback) executionCallback();
            }
        }

        function populateHlsAudioTracks() {
            if (!hlsInstance || !hlsInstance.audioTracks || hlsInstance.audioTracks.length <= 1) return;
            const sel = document.getElementById('audioTrackSelect');
            sel.innerHTML = '';
            hlsInstance.audioTracks.forEach((track, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.text = track.name || track.lang || `Track ${idx}`;
                sel.appendChild(opt);
            });
            sel.value = hlsInstance.audioTrack;
            currentAudioTrackId = hlsInstance.audioTrack;
            document.getElementById('audioTrackPanel').style.display = 'block';
        }

        function selectAudioTrack(idx, broadcast) {
            idx = parseInt(idx, 10);
            if (hlsInstance) hlsInstance.audioTrack = idx;
            currentAudioTrackId = idx;
            if (broadcast) watchChannel.trigger('client-global-track', { type: 'audio', trackId: idx });
        }

        // =========================================================================
        // SUBTITLES: URL ingest, file upload, room sharing
        // All paths converge on parseVttToCues → addParsedSubtitleTrack, so the
        // rendering engine only needs to know about parsed cues.
        // =========================================================================

        function isLikelySrt(url, filename) {
            const target = (filename || url || '').toLowerCase();
            return target.endsWith('.srt');
        }

        function ingestSubtitleFromUrl() {
            const input = document.getElementById('subtitleUrlInputFs');
            const url = input.value.trim();
            if (!url) return;
            const label = url.split('/').pop().split('?')[0].replace(/\.(srt|vtt)$/i, '') || 'Subtitle';
            const isSrt = isLikelySrt(url, '');
            input.value = '';

            appendMessage(\"System\", `Fetching subtitle from URL...`);
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                })
                .then(text => {
                    const vttText = isSrt ? srtToVtt(text) : text;
                    const cues = parseVttToCues(vttText);
                    if (!cues.length) throw new Error('No cues found in file');
                    addParsedSubtitleTrack(label, cues);
                    const newIdx = subtitleTracks.length - 1;
                    selectSubtitleTrack(newIdx, true);
                    appendMessage(\"System\", `Subtitle \"${label}\" loaded (${cues.length} lines). Sharing with the room...`);
                    broadcastSubtitleText(vttText, label);
                })
                .catch(err => {
                    appendMessage(\"System\", `Couldn't load subtitle from URL: ${err.message}. The host may block cross-origin access — try uploading the file directly instead.`);
                });
        }

        function ingestExternalSubtitles(uploaderNode) {
            const nativeFile = uploaderNode.files[0];
            if (!nativeFile) return;
            const isSrt = isLikelySrt('', nativeFile.name);
            const label = nativeFile.name.replace(/\.(vtt|srt)$/i, '');
            const reader = new FileReader();
            reader.onload = () => {
                const vttText = isSrt ? srtToVtt(reader.result) : reader.result;
                const cues = parseVttToCues(vttText);
                if (!cues.length) {
                    appendMessage(\"System\", `Couldn't parse \"${label}\" — file appears to be empty or malformed.`);
                    return;
                }
                addParsedSubtitleTrack(label, cues);
                const newIdx = subtitleTracks.length - 1;
                selectSubtitleTrack(newIdx, true);
                appendMessage(\"System\", `Subtitle \"${label}\" loaded (${cues.length} lines). Sharing with the room...`);
                broadcastSubtitleText(vttText, label);
            };
            reader.readAsText(nativeFile);
            uploaderNode.value = ''; // allow re-upload of same file
        }

        // =========================================================================
        // BROADCAST SUBTITLE TEXT TO THE ROOM (chunked to stay under Pusher's ~10KB/event cap)
        // =========================================================================
        const SUBTITLE_CHUNK_SIZE = 7000;
        const incomingSubtitleTransfers = {};

        function showSubtitleSyncBadge(text) {
            const badge = document.getElementById('subtitleSyncBadge');
            const label = document.getElementById('subtitleSyncBadgeText');
            if (label) label.textContent = text;
            if (badge) badge.style.display = 'flex';
        }
        function hideSubtitleSyncBadge() {
            const badge = document.getElementById('subtitleSyncBadge');
            if (badge) badge.style.display = 'none';
        }

        function broadcastSubtitleText(vttText, label) {
            const transferId = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
            const chunks = [];
            for (let i = 0; i < vttText.length; i += SUBTITLE_CHUNK_SIZE) {
                chunks.push(vttText.slice(i, i + SUBTITLE_CHUNK_SIZE));
            }
            showSubtitleSyncBadge(`Sending \"${label}\" to everyone...`);
            chunks.forEach((chunk, idx) => {
                setTimeout(() => {
                    watchChannel.trigger('client-subtitle-chunk', { transferId, index: idx, total: chunks.length, label, chunk });
                    if (idx === chunks.length - 1) hideSubtitleSyncBadge();
                }, idx * 120);
            });
        }

        watchChannel.bind('client-subtitle-chunk', (data) => {
            let transfer = incomingSubtitleTransfers[data.transferId];
            if (!transfer) {
                transfer = incomingSubtitleTransfers[data.transferId] = { parts: new Array(data.total), received: 0, total: data.total, label: data.label };
                appendMessage(\"System\", `Receiving subtitle \"${data.label}\" from the room...`);
            }
            if (transfer.parts[data.index] === undefined) {
                transfer.parts[data.index] = data.chunk;
                transfer.received++;
            }
            showSubtitleSyncBadge(`Syncing subtitle \"${transfer.label}\"... ${transfer.received}/${transfer.total}`);
            if (transfer.received === transfer.total) {
                hideSubtitleSyncBadge();
                const fullText = transfer.parts.join('');
                const cues = parseVttToCues(fullText);
                if (cues.length) {
                    addParsedSubtitleTrack(transfer.label, cues);
                    appendMessage(\"System\", `Subtitle \"${transfer.label}\" received (${cues.length} lines).`);
                } else {
                    appendMessage(\"System\", `Received subtitle \"${transfer.label}\" but couldn't parse it.`);
                }
                delete incomingSubtitleTransfers[data.transferId];
            }
        });

        // =========================================================================
        // SUBTITLE TIMING / STYLE
        // =========================================================================
        function syncSubtitleLabel(baseId, value) {
            const el = document.getElementById(baseId);
            if (el) el.innerText = `Timing: ${value.toFixed(1)}s`;
        }

        function adjustSubtitleTiming(stepDelta) {
            subDelayOffset += stepDelta;
            syncSubtitleLabel('lblSubDelayFs', subDelayOffset);
            renderCaptionsAtCurrentTime();
            watchChannel.trigger('client-global-track', { type: 'subdelay', value: subDelayOffset });
        }

        function adjustSubtitleStyling(property, modificationDelta) {
            const rootEl = document.documentElement;
            if (property === 'size') {
                subSizePx = Math.max(10, Math.min(48, subSizePx + modificationDelta));
                rootEl.style.setProperty('--sub-size-val', `${subSizePx}px`);
                document.getElementById('lblSubSizeFs').innerText = `Size: ${subSizePx}px`;
            } else if (property === 'pos') {
                subPositionLift += modificationDelta;
                rootEl.style.setProperty('--sub-pos-val', `${subPositionLift}px`);
                document.getElementById('lblSubPosFs').innerText = `Lift: ${subPositionLift}px`;
            } else if (property === 'opacity') {
                subOpacityFloat = Math.max(0.1, Math.min(1.0, subOpacityFloat + modificationDelta));
                rootEl.style.setProperty('--sub-opacity-val', subOpacityFloat.toFixed(1));
                document.getElementById('lblSubOpacityFs').innerText = `Opacity: ${subOpacityFloat.toFixed(1)}`;
            }
        }

        // =========================================================================
        // CHAT + FULLSCREEN OVERLAYS
        // =========================================================================
        watchChannel.bind('client-chat-msg', (data) => {
            appendMessage(data.user, data.text);
            if (floatingToastActive) renderFloatingFullscreenToast(data.user, data.text);
        });

        function transmitMessage(isFullscreenSource) {
            const inputField = isFullscreenSource ? document.getElementById('fullscreenChatInput') : document.getElementById('sidebarChatInput');
            const plaintext = inputField.value.trim();
            if (!plaintext) return;
            watchChannel.trigger('client-chat-msg', { user: currentUsername, text: plaintext });
            appendMessage(currentUsername + ' (You)', plaintext);
            if (isFullscreenSource && floatingToastActive) renderFloatingFullscreenToast(currentUsername + ' (You)', plaintext);
            inputField.value = '';
        }

        function appendMessage(author, string) {
            const textPanel = document.getElementById('chatLog');
            const containerBubble = document.createElement('div');
            containerBubble.className = 'message-bubble';
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            containerBubble.innerHTML = `<div class=\"message-header\"><span class=\"message-author\"></span><span class=\"message-time\"></span></div><div></div>`;
            containerBubble.querySelector('.message-author').textContent = author;
            containerBubble.querySelector('.message-time').textContent = timestamp;
            containerBubble.querySelector('div:last-child').textContent = string;
            textPanel.appendChild(containerBubble);
            textPanel.scrollTop = textPanel.scrollHeight;
        }

        function renderFloatingFullscreenToast(sender, payload) {
            const toastFrame = document.getElementById('toastLayer');
            const individualToast = document.createElement('div');
            individualToast.className = 'floating-toast';
            const strong = document.createElement('strong');
            strong.textContent = sender + ': ';
            individualToast.appendChild(strong);
            individualToast.appendChild(document.createTextNode(payload));
            individualToast.addEventListener('click', () => individualToast.remove());
            toastFrame.appendChild(individualToast);
            setTimeout(() => individualToast.remove(), 5000);
        }

        // =========================================================================
        // ROOM / PROFILE
        // =========================================================================
        function updateProfileHandle() {
            const inputVal = document.getElementById('usernameInput').value.trim();
            if (inputVal) {
                currentUsername = inputVal;
                localStorage.setItem('party_user', currentUsername);
                appendMessage(\"System\", `Changed your name to: ${currentUsername}`);
            }
        }

        function createNewRoom() {
            const secureUniqueId = Math.random().toString(36).substring(2, 13);
            window.location.href = `?room=${secureUniqueId}`;
        }

        function shareActiveRoom() {
            const targetInviteUrl = window.location.href;
            const finish = () => {
                if (navigator.share) navigator.share({ title: 'Watch Party Invite', url: targetInviteUrl }).catch(() => {});
                else alert(\"Link copied! Send it to your friend: \" + targetInviteUrl);
            };
            if (navigator.clipboard) {
                navigator.clipboard.writeText(targetInviteUrl).then(() => {
                    appendMessage(\"System\", \"Invite link copied to clipboard.\");
                    finish();
                }).catch(finish);
            } else finish();
        }

        // =========================================================================
        // CUSTOM PLAYER BUTTONS
        // =========================================================================
        function injectCustomPlayerButtons() {
            const controlsGrid = document.querySelector('.plyr__controls');
            if (!controlsGrid) return;

            const toastBtn = document.createElement('button');
            toastBtn.type = 'button';
            toastBtn.className = 'custom-player-toggle active';
            toastBtn.innerHTML = '💬 Floating';
            toastBtn.title = 'Toggle floating chat messages';
            toastBtn.addEventListener('click', () => {
                floatingToastActive = !floatingToastActive;
                toastBtn.classList.toggle('active', floatingToastActive);
            });

            const inputBtn = document.createElement('button');
            inputBtn.type = 'button';
            inputBtn.className = 'custom-player-toggle';
            inputBtn.innerHTML = '⌨ Quick Chat';
            inputBtn.title = 'Toggle the fullscreen quick-chat box';

            const subtitleBtn = document.createElement('button');
            subtitleBtn.type = 'button';
            subtitleBtn.className = 'custom-player-toggle';
            subtitleBtn.innerHTML = '💬 Subtitles';
            subtitleBtn.title = 'Toggle subtitle timing & style controls';

            inputBtn.addEventListener('click', () => {
                glassInputActive = !glassInputActive;
                document.getElementById('glassInputLayer').style.display = glassInputActive ? 'block' : 'none';
                inputBtn.classList.toggle('active', glassInputActive);
                if (glassInputActive && glassSubtitleActive) subtitleBtn.click();
            });
            subtitleBtn.addEventListener('click', () => {
                glassSubtitleActive = !glassSubtitleActive;
                document.getElementById('glassSubtitleLayer').style.display = glassSubtitleActive ? 'block' : 'none';
                subtitleBtn.classList.toggle('active', glassSubtitleActive);
                if (glassSubtitleActive && glassInputActive) inputBtn.click();
            });

            controlsGrid.appendChild(toastBtn);
            controlsGrid.appendChild(inputBtn);
            controlsGrid.appendChild(subtitleBtn);
        }

        document.getElementById('sidebarChatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') transmitMessage(false); });
        document.getElementById('fullscreenChatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') transmitMessage(true); });
        document.getElementById('subtitleUrlInputFs').addEventListener('keydown', (e) => { if (e.key === 'Enter') ingestSubtitleFromUrl(); });
    </script>
</body>
</html>
