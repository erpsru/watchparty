<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Watch Party</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://js.pusher.com/8.0/pusher.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-bg: rgba(25, 25, 35, 0.65);
            --accent-color: #6366f1;
            --text-color: #f3f4f6;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* App Main Framework: Flexible Side-by-Side Grid */
        .app-container {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        /* Video Section Stays Contained & Locked in Position */
        .video-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #000;
            position: relative;
            max-height: 100%;
        }

        /* Elastic Player Wrapper prevents controls from sliding off-screen */
        .player-wrapper {
            width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            margin: auto;
        }

        .plyr {
            height: 100% !important;
            max-height: 100vh;
        }

        /* Clean Sidebar Chat Panel with Custom Internal Scrollbar Rules */
        .chat-section {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .chat-section.collapsed {
            display: none;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Fixes Text Overflow: Keeps long strings from breaking layout mechanics */
        .message-bubble {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 12px;
            word-break: break-word; /* Forces long text segments to wrap elegantly */
            max-width: 100%;
        }

        .message-author {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-bottom: 4px;
            font-weight: bold;
        }

        /* Text input panels */
        .input-bar {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            color: #fff;
            outline: none;
            text-overflow: ellipsis; /* Shrinks hyper-long URLs with an elegant ... */
            white-space: nowrap;
            overflow: hidden;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            white-space: normal; /* Restores visibility on click */
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* 📱 Mobile Layout Engine Overhaul */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                overflow-y: auto;
            }

            .video-section {
                flex: none;
                width: 100%;
                position: sticky;
                top: 0;
                z-index: 10;
            }

            .chat-section {
                flex: 1;
                max-width: 100%;
                min-width: 100%;
                height: 50vh;
                border-left: none;
                border-top: 1px solid var(--border-color);
            }
        }

        /* Scrollbar Stylings */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="input-bar" style="background: rgba(20,20,30,0.9);">
        <input type="text" id="videoUrlInput" placeholder="Paste Direct Dual-Audio/Movie URL Here (.mp4, .m3u8, etc.)">
        <button onclick="loadNewVideo()">Load Movie</button>
        <button id="toggleChatBtn" onclick="toggleChatPanel()">💬 Toggle Chat</button>
    </div>

    <div class="app-container">
        <div class="video-section">
            <div class="player-wrapper">
                <video id="player" playsinline controls>
                    <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4" />
                </video>
            </div>
        </div>

        <div class="chat-section" id="chatPanel">
            <div class="chat-messages" id="chatLog">
                <div class="message-bubble">
                    <div class="message-author">System</div>
                    Welcome! Copy your current URL path to invite friends to sync securely.
                </div>
            </div>
            <div class="input-bar">
                <input type="text" id="chatMessageInput" placeholder="Type a message...">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.js"></script>

    <script>
        // =========================================================================
        // CONFIGURATION: INSERT YOUR PUSHER CREDENTIALS HERE
        // =========================================================================
        const PUSHER_KEY = '25790a5661338b7c7756';
        const PUSHER_CLUSTER = 'ap2';
        const PUSHER_SECRET = '9a7ffd7b2858442cd939'; // Secure client-side calculator handles this
        
        // Setup room based on URL params or auto-generate a secure hash
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        if (!roomId) {
            roomId = Math.random().toString(36).substring(2, 15);
            window.history.pushState({}, '', `?room=${roomId}`);
        }
        const channelName = `private-watch-${roomId}`;

        // Initialize Advanced Fluid Video Player Core
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'fullscreen'],
            ratio: '16:9'
        });

        let isSyncing = false;
        let updateTimeout;

        // =========================================================================
        // PUSHER SERVERLESS PRIVATE HANDSHAKE ENGINE
        // =========================================================================
        const pusher = new Pusher(PUSHER_KEY, {
            cluster: PUSHER_CLUSTER,
            channelAuthorization: {
                transport: 'ajax',
                customHandler: function({ socketId, channelName }, callback) {
                    // Browser-Side Signing Signature Generation
                    // Emulates a backend server endpoint by computing HMAC-SHA256 locally.
                    const stringToSign = socketId + ":" + channelName;
                    const hash = CryptoJS.HmacSHA256(stringToSign, PUSHER_SECRET);
                    const signature = CryptoJS.enc.Hex.stringify(hash);
                    
                    callback(null, {
                        auth: PUSHER_KEY + ":" + signature
                    });
                }
            }
        });

        // Join Room Channel Securely
        const watchChannel = pusher.subscribe(channelName);

        // =========================================================================
        // MEDIA SYNC AND COORDINATION EVENT BINDINGS
        // =========================================================================
        watchChannel.bind('client-video-play', (data) => {
            if (Math.abs(player.currentTime - data.time) > 1.5) {
                isSyncing = true;
                player.currentTime = data.time;
            }
            player.play();
            setTimeout(() => { isSyncing = false; }, 500);
        });

        watchChannel.bind('client-video-pause', (data) => {
            player.pause();
            if (Math.abs(player.currentTime - data.time) > 1.5) {
                isSyncing = true;
                player.currentTime = data.time;
                setTimeout(() => { isSyncing = false; }, 500);
            }
        });

        watchChannel.bind('client-chat-msg', (data) => {
            appendMessage(data.user, data.text);
        });

        // Player Actions Trigger Direct, Low-Latency Socket Blasts
        player.on('play', () => {
            if (isSyncing) return;
            watchChannel.trigger('client-video-play', { time: player.currentTime });
        });

        player.on('pause', () => {
            if (isSyncing) return;
            watchChannel.trigger('client-video-pause', { time: player.currentTime });
        });

        // Rate-limiting / Debouncing timeline adjustments to save message quota
        player.on('seeking', () => {
            if (isSyncing) return;
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
                watchChannel.trigger('client-video-play', { time: player.currentTime });
            }, 300);
        });

        // =========================================================================
        // UI AND UTILITY HELPER FUNCS
        // =========================================================================
        function loadNewVideo() {
            const url = document.getElementById('videoUrlInput').value.trim();
            if (!url) return;
            
            // Updates media source paths seamlessly inside the active framework shell
            player.source = {
                type: 'video',
                sources: [{ src: url }]
            };
            
            appendMessage("System", "Loaded new movie path stream successfully.");
        }

        function sendChatMessage() {
            const input = document.getElementById('chatMessageInput');
            const msg = input.value.trim();
            if (!msg) return;

            watchChannel.trigger('client-chat-msg', { user: 'Friend', text: msg });
            appendMessage('You', msg);
            input.value = '';
        }

        function appendMessage(user, text) {
            const log = document.getElementById('chatLog');
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = `<div class="message-author">${user}</div><div>${text}</div>`;
            log.appendChild(bubble);
            log.scrollTop = log.scrollHeight;
        }

        function toggleChatPanel() {
            document.getElementById('chatPanel').classList.toggle('collapsed');
        }

        // Allow pressing enter key to transmit chats instantly
        document.getElementById('chatMessageInput').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') sendChatMessage();
        });
    </script>
</body>
</html>
